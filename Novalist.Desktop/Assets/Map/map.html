<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --bg: #1e1e2e;
    --fg: #cdd6f4;
    --accent: #0E8BDF;
    --pin: #f9c46a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: 'Segoe UI', sans-serif; user-select: none; }
#stage {
    position: fixed; inset: 0; cursor: default; overflow: hidden;
}
#stage.dragging { cursor: grabbing; }
/* Cursor + hover affordances driven by tool mode (body class set by applyToolModeClass). */
body.tool-add-pin   #stage,
body.tool-add-label #stage,
body.tool-spline    #stage,
body.tool-terrain   #stage,
body.tool-border    #stage,
body.tool-building  #stage { cursor: crosshair; }
/* Hover affordance — JS-debounced (.nv-hovered class applied after the cursor
   rests on an element for ~600ms). CSS-only :hover caused per-path flicker on
   multi-segment SVGs (splines, terrain, buildings) and constant churn when
   sweeping across the map. The transition gives a gentle fade in / out. */
body.tool-select.mode-edit .nv-terrain path,
body.tool-select.mode-edit .nv-building polygon,
body.tool-select.mode-edit .nv-building path,
body.tool-select.mode-edit #spline-svg path[data-spline-id],
body.tool-select.mode-edit .nv-image,
body.tool-select.mode-edit .nv-pin-marker,
body.tool-select.mode-edit .nv-label { cursor: pointer; }
.nv-terrain path, .nv-building polygon, .nv-building path,
#spline-svg path[data-spline-id] {
    transition: filter 280ms ease;
}
.nv-image, .nv-pin-marker, .nv-label {
    transition: outline-color 280ms ease, box-shadow 280ms ease;
}
.nv-terrain.nv-hovered path,
.nv-building.nv-hovered polygon,
.nv-building.nv-hovered path,
#spline-svg path[data-spline-id].nv-hovered { filter: brightness(1.2); }
.nv-pin-host.nv-hovered .nv-pin-marker { outline: 2px solid var(--accent); outline-offset: 2px; }
.nv-label.nv-hovered                   { outline: 1px dashed var(--accent); outline-offset: 3px; }
.nv-image.nv-hovered                   { outline: 2px solid var(--accent); }
/* 3D view canvas — hidden until Map3D.enter(); swaps in place with #stage. */
#stage3d { position: fixed; inset: 0; display: none; outline: none; }
#world {
    position: absolute; left: 0; top: 0;
    transform-origin: 0 0;
    will-change: transform;
}
.nv-image {
    position: absolute;
    left: 0;
    top: 0;
    pointer-events: auto;
    image-rendering: high-quality;
    transform-origin: 0 0;
    /* Composited transform: translate(center) rotate translate(-half) scale = visual
       rect at (x,y,w,h) rotated about its center. Natural pixels preserved for sharp
       zoom-in until intrinsic resolution is exceeded. */
}
body.mode-view .nv-image { pointer-events: none; }
.nv-image.selected { outline: 2px solid var(--accent); outline-offset: 2px; }
/* Pins live in a screen-space overlay (NOT scaled with #world) so the marker
   stays crisp + constant-size at any zoom level. The host element is anchored
   at the pin's world point projected to screen coords. */
#pin-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
}
#image-handles {
    position: absolute; inset: 0;
    pointer-events: none;
}
.nv-handle {
    position: absolute;
    width: 10px; height: 10px;
    background: #fff;
    border: 1px solid #1c1a18;
    pointer-events: auto;
    transform: translate(-50%, -50%);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
}
.nv-handle.rotate {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border-color: #fff;
}
.nv-handle.nw, .nv-handle.se { cursor: nwse-resize; }
.nv-handle.ne, .nv-handle.sw { cursor: nesw-resize; }
.nv-handle.n,  .nv-handle.s  { cursor: ns-resize; }
.nv-handle.e,  .nv-handle.w  { cursor: ew-resize; }
.nv-handle.rotate { cursor: grab; }
.nv-handle-frame {
    position: absolute;
    border: 1px dashed var(--accent);
    pointer-events: none;
    transform-origin: 50% 50%;
}
.nv-clip-line {
    position: absolute;
    height: 0;
    border-top: 1px dashed #ff9c42;
    transform-origin: 0 0;
    pointer-events: none;
}
.nv-clip-handle {
    background: #ff9c42 !important;
    border-color: #1c1a18 !important;
    cursor: move;
}
/* Unified persistent bottom bar — replaces five per-mode toolbars. Always
   visible, full width. Contents driven by renderBottomBar() based on current
   selection / draft state. */
#nv-bottom-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: #2a2a3a;
    border-top: 1px solid #3a3a4a;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 900;
    box-shadow: 0 -2px 12px rgba(0,0,0,.4);
    min-height: 44px;
    font-size: 12px;
    color: #cdd6f4;
}
#nv-bottom-bar .bb-left   { flex: 0 0 auto; font-weight: 600; }
#nv-bottom-bar .bb-center { flex: 1 1 auto; display: flex; gap: 10px; align-items: center; color: #aaa; }
#nv-bottom-bar .bb-right  { flex: 0 0 auto; display: flex; gap: 8px; align-items: center; }
#nv-bottom-bar .bb-hint   { color: #888; font-style: italic; }
#nv-bottom-bar .bb-kbd    { color: #6fd0ff; font-family: ui-monospace, Consolas, monospace; }
#nv-bottom-bar button {
    padding: 6px 14px; border: none; border-radius: 3px;
    cursor: pointer; font-size: 12px; background: #444; color: #fff;
}
#nv-bottom-bar button:hover:not(:disabled) { filter: brightness(1.15); }
#nv-bottom-bar button.primary  { background: var(--accent); }
#nv-bottom-bar button.danger   { background: #b34a4a; }
#nv-bottom-bar button.active   { background: var(--accent); outline: 2px solid #fff3; }
#nv-bottom-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
#nv-bottom-bar .bb-field {
    display: inline-flex; align-items: center; gap: 4px;
    background: #1e1e2e; border: 1px solid #444; border-radius: 3px;
    padding: 2px 6px;
}
#nv-bottom-bar .bb-flabel {
    color: #888; font-size: 11px;
}
#nv-bottom-bar .bb-field input[type=text],
#nv-bottom-bar .bb-field input[type=number] {
    background: transparent; color: #fff; border: none; outline: none;
    font-size: 12px; padding: 2px 0;
}
#nv-bottom-bar .bb-field input[type=number] { width: 60px; }
#nv-bottom-bar .bb-field input[type=text]   { width: 130px; }
#nv-bottom-bar .bb-field input[type=color] {
    background: transparent; border: none; cursor: pointer;
    width: 22px; height: 22px; padding: 0;
}
#nv-bottom-bar .bb-field input[type=range] { vertical-align: middle; width: 100px; }
#nv-bottom-bar .bb-field select {
    background: #1e1e2e; color: #fff; border: 1px solid #444; border-radius: 3px;
    font-size: 12px; padding: 3px 6px; outline: none;
}
#nv-bottom-bar .bb-field input[type=checkbox] { margin: 0; }
#nv-bottom-bar .bb-toggle {
    display: inline-flex; border: 1px solid #444; border-radius: 3px; overflow: hidden;
}
#nv-bottom-bar .bb-toggle button {
    padding: 4px 10px; border-radius: 0; background: #1e1e2e;
}
#nv-bottom-bar .bb-toggle button.active { background: var(--accent); }
.bb-popover {
    position: fixed; z-index: 950;
    background: #2a2a3a; border: 1px solid #6fd0ff; border-radius: 4px;
    padding: 10px 14px; box-shadow: 0 4px 14px rgba(0,0,0,.5);
    display: flex; flex-direction: column; gap: 8px;
    min-width: 200px;
}
.nv-spline-line {
    position: absolute;
    height: 0;
    border-top: 1px dashed #6fd0ff;
    transform-origin: 0 0;
    pointer-events: none;
}
/* Terrain shapes: one <svg> per shape inside #world, path authored in world
   units, scaled by the current zoom via transform (no rebuild on zoom). */
.nv-terrain {
    position: absolute;
    left: 0; top: 0;
    overflow: visible;
    transform-origin: 0 0;
    pointer-events: none;
}
.nv-terrain path { pointer-events: auto; }
.nv-building {
    position: absolute;
    left: 0; top: 0;
    overflow: visible;
    transform-origin: 0 0;
    pointer-events: none;
}
.nv-building polygon, .nv-building path { pointer-events: auto; }
.nv-bld-rot-handle {
    background: #ffae42 !important;
    border-color: #1c1a18 !important;
    border-radius: 50%;
    width: 12px; height: 12px;
    cursor: grab;
}
.nv-floor-selector {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(28,26,24,0.85);
    border: 1px solid #d8a24a;
    border-radius: 4px;
    color: #fff;
    font-size: 11px;
    pointer-events: auto;
    z-index: 8;
    user-select: none;
}
.nv-floor-selector button {
    background: none; border: none; color: #fff;
    cursor: pointer; padding: 1px 6px; font-size: 11px; line-height: 1.2;
}
.nv-floor-selector button:hover { background: #d8a24a; color: #1c1a18; }
.nv-floor-selector .lbl { padding: 1px 4px; font-weight: 600; }
.nv-terrain-line {
    position: absolute;
    height: 0;
    border-top: 1px dashed #7bd88f;
    transform-origin: 0 0;
    pointer-events: none;
}
.nv-terrain-handle {
    background: #7bd88f !important;
    border-color: #11301a !important;
    cursor: move;
}
.nv-terrain-handle-sel {
    background: #ffae42 !important;
    border-color: #1c1a18 !important;
    width: 14px; height: 14px;
}
.nv-spline-handle {
    background: #6fd0ff !important;
    border-color: #0a2230 !important;
    cursor: move;
}
.nv-spline-handle-sel {
    background: #ffae42 !important;
    border-color: #1c1a18 !important;
    width: 14px; height: 14px;
}
.nv-spline-width-handle {
    background: #2a2a3a !important;
    border-color: #6fd0ff !important;
    border-radius: 50%;
    width: 8px; height: 8px;
    cursor: ns-resize;
}
.nv-spline-rot-handle {
    background: #ffae42 !important;
    border-color: #1c1a18 !important;
    border-radius: 50%;
    width: 11px; height: 11px;
    cursor: crosshair;
}
/* .nv-edit-toolbar removed — replaced by #nv-bottom-bar above. */
.nv-ctx-menu {
    position: fixed;
    background: #2a2a3a;
    border: 1px solid #555;
    padding: 4px 0;
    z-index: 1000;
    font-size: 12px;
    min-width: 170px;
    box-shadow: 0 4px 12px rgba(0,0,0,.5);
    border-radius: 3px;
}
.nv-ctx-menu div {
    padding: 6px 14px;
    cursor: pointer;
    color: #cdd6f4;
}
.nv-ctx-menu div:hover { background: #3a3a4a; }
.nv-pin-host {
    position: absolute;
    transform: translate(-50%, -100%); /* pin tip aligns to (x,y) */
    pointer-events: auto;
    cursor: pointer;
}
.nv-pin-marker {
    width: 22px; height: 22px;
    background: var(--pin);
    border: 2px solid #1c1a18;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.nv-pin-host.selected .nv-pin-marker {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}
@keyframes nv-pin-flash {
    0%   { filter: drop-shadow(0 0 0 var(--accent)); }
    25%  { filter: drop-shadow(0 0 14px var(--accent)) brightness(1.6); }
    100% { filter: drop-shadow(0 0 0 var(--accent)); }
}
.nv-pin-host.nv-pin-flash .nv-pin-marker { animation: nv-pin-flash 1.4s ease-out 2; }
.nv-pin-label {
    position: absolute;
    left: 50%; bottom: 100%;
    margin-bottom: 6px;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    color: #fff;
    white-space: nowrap;
    pointer-events: none;
}
/* Free-standing text annotations. Like pins they live in a screen-space
   overlay, but the font size scales with zoom so a region name stays glued to
   its area. A dark halo keeps the text readable over any map background. */
#label-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
}
/* Map border: the visible outline frame. Clipping itself is done with
   clip-path on #world / the overlays; this SVG only draws the stroke. */
#border-outline {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: visible;
}
.nv-border-handle {
    background: #d8a24a !important;
    border-color: #2a1c08 !important;
    cursor: move;
}
.nv-border-line {
    position: absolute;
    height: 0;
    border-top: 1px dashed #d8a24a;
    transform-origin: 0 0;
    pointer-events: none;
}
.nv-label {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    cursor: move;
    color: #fff;
    font-weight: 600;
    white-space: pre-wrap;
    text-shadow: 0 0 3px #000, 0 0 3px #000, 0 1px 2px #000;
    user-select: none;
    line-height: 1.2;
}
.nv-label.selected {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}
.nv-label.editing {
    cursor: text;
    user-select: text;
    outline: 1px solid var(--accent);
    outline-offset: 3px;
    min-width: 1ch;
}
#hud {
    position: fixed; left: 12px; top: 12px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
}
#hud3d {
    position: fixed; left: 12px; top: 12px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-family: ui-monospace, Consolas, "Courier New", monospace;
    font-size: 11px;
    line-height: 1.35;
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    white-space: pre;
    display: none;
}
</style>
</head>
<body class="mode-edit">
<div id="stage">
    <div id="world"></div>
    <div id="image-handles"></div>
    <div id="pin-overlay"></div>
    <div id="label-overlay"></div>
    <svg id="border-outline"></svg>
</div>
<canvas id="stage3d"></canvas>
<div id="hud">Map</div>
<div id="hud3d"></div>
<div id="nv-bottom-bar">
    <div class="bb-left"></div>
    <div class="bb-center"></div>
    <div class="bb-right"></div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "./three.webgpu.min.js",
    "three/webgpu": "./three.webgpu.min.js",
    "three/tsl": "./three.tsl.min.js",
    "lil-gui": "./lil-gui.module.min.js"
  }
}
</script>
<script>
'use strict';

const stage = document.getElementById('stage');
const world = document.getElementById('world');
const pinOverlay = document.getElementById('pin-overlay');
const labelOverlay = document.getElementById('label-overlay');
const borderOutline = document.getElementById('border-outline');
const handlesOverlay = document.getElementById('image-handles');
const hud = document.getElementById('hud');

let mapData = { groups: [], pins: [] };
let mode = 'edit';
let pan = { x: 0, y: 0 };
let zoom = 1;
let selected = null; // { kind:'image'|'pin'|'label', id, layerId? }
let imageBaseUrl = '';
let activeLayerId = '';
let clipEdit = null; // { layerId, imageId, points: [{x,y} in natural-pixel coords] }
let toolMode = 'select'; // 'select' | 'add-pin' | 'add-label' | 'spline'

// ── Spline (roads & rivers) ─────────────────────────────────────────────
// SVG layer drawn inside #world. #world only translates by pan, so spline
// geometry is authored in world*zoom coords and rebuilt on zoom change.
const SVG_NS = 'http://www.w3.org/2000/svg';
const splineSvg = document.createElementNS(SVG_NS, 'svg');
splineSvg.setAttribute('id', 'spline-svg');
splineSvg.style.cssText = 'position:absolute;left:0;top:0;overflow:visible;pointer-events:none;';

// Delegated spline interaction: ONE set of listeners on the SVG instead of
// three per fill quad — with many splines that is thousands of listeners saved.
// e.target is the hit <path>; its data-spline-id says which spline.
splineSvg.addEventListener('mousedown', e => {
    const id = e.target && e.target.dataset && e.target.dataset.splineId;
    if (!id || id === '__draft__' || e.button !== 0) return;
    if (mode !== 'edit' || toolMode !== 'select') return;
    e.stopPropagation();
    selectSpline(id);
});
splineSvg.addEventListener('dblclick', e => {
    const id = e.target && e.target.dataset && e.target.dataset.splineId;
    if (!id || id === '__draft__') return;
    if (mode !== 'edit' || toolMode !== 'select') return;
    const sp = findSpline(id);
    if (!sp || !sp.points || sp.points.length < 2) return;
    e.stopPropagation(); e.preventDefault();
    const wx = (e.clientX - pan.x) / zoom, wy = (e.clientY - pan.y) / zoom;
    const N = sp.points.length, segCount = sp.closed ? N : N - 1;
    let bestSeg = 0, bestD = Infinity;
    for (let i = 0; i < segCount; i++) {
        const a = sp.points[i], b = sp.points[(i + 1) % N];
        const d = distToSegment(wx, wy, a.x, a.y, b.x, b.y);
        if (d < bestD) { bestD = d; bestSeg = i; }
    }
    insertSplineKnot(id, bestSeg, wx, wy);
});
splineSvg.addEventListener('contextmenu', e => {
    const id = e.target && e.target.dataset && e.target.dataset.splineId;
    if (!id || id === '__draft__' || mode !== 'edit') return;
    e.preventDefault(); e.stopPropagation();
    const sp = findSpline(id);
    if (sp) showSplineContextMenu(e, sp);
});

// Visual profiles. casing.extra = world units added each side beyond the road
// edge. bands = fill polygons (from/to are fractions of half-width, -1..1).
// markings = stroked lines at an offset fraction; width/dash are screen pixels.
// Terrain type presets — seed the fill colour at creation; the colour is then
// stored per-shape and independently editable.
const TERRAIN_PRESETS = {
    grass:    '#8db360',
    forest:   '#4a7c3a',
    concrete: '#9a9a98',
    sand:     '#e3d2a0',
    hills:    '#a6b56a',
    mountain: '#8a7f70',
    water:    '#5b86b3',
};

const SPLINE_PROFILES = {
    road: {
        motorway: { defaultWidth: 44, casing: { color: '#3f3413', extra: 5 },
            bands: [{ from: -1, to: 1, color: '#F7C45F' }],
            markings: [{ offset: 0, color: '#ffffff', width: 2, dash: [16, 12] },
                       { offset: -0.93, color: '#ffffff', width: 1.5 },
                       { offset: 0.93, color: '#ffffff', width: 1.5 }] },
        primary: { defaultWidth: 32, casing: { color: '#6b5a1a', extra: 4 },
            bands: [{ from: -1, to: 1, color: '#FFF2AF' }],
            markings: [{ offset: 0, color: '#e0b000', width: 1.8 },
                       { offset: -0.9, color: '#ffffff', width: 1.3 },
                       { offset: 0.9, color: '#ffffff', width: 1.3 }] },
        secondary: { defaultWidth: 24, casing: { color: '#7a7a7a', extra: 3 },
            bands: [{ from: -1, to: 1, color: '#FFFFFF' }],
            markings: [{ offset: 0, color: '#cfcfcf', width: 1.4, dash: [10, 10] }] },
        residential: { defaultWidth: 16, casing: { color: '#8a8a8a', extra: 2 },
            bands: [{ from: -1, to: 1, color: '#FFFFFF' }], markings: [] },
        service: { defaultWidth: 9, casing: { color: '#6e6e6e', extra: 1 },
            bands: [{ from: -1, to: 1, color: '#cfcfcf' }], markings: [] },
        pedestrian: { defaultWidth: 14, casing: { color: '#9a8d7a', extra: 1 },
            bands: [{ from: -1, to: 1, color: '#d8cbb4' }], markings: [] },
        trail: { defaultWidth: 12, casing: { color: '#d8cdb0', extra: 0 },
            bands: [{ from: -1, to: 1, color: '#d8cdb0' }],
            // A single dashed centre marking = the dotted footpath look.
            markings: [{ offset: 0, color: '#7a5c3a', width: 5, dash: [4, 10] }] },
        track: { defaultWidth: 26, casing: { color: '#3a2f22', extra: 1 },
            bands: [{ from: -1, to: 1, color: '#b9ad97' }], // ballast
            // Cross-ties: a thick dashed marking → rectangles `width` wide
            // (perpendicular) and `dash[0]` long, spaced by `dash[1]`. Then the
            // two rails on top. Tie offset is slightly off 0 so it counts as an
            // edge marking (drawn before / under the rails, not a centreline).
            markings: [{ offset: 0.001, color: '#5a4632', width: 30, dash: [4, 9] },
                       { offset: -0.55, color: '#4b4b4b', width: 2.2 },
                       { offset: 0.55, color: '#4b4b4b', width: 2.2 }] },
    },
    river: {
        brook: { defaultWidth: 8, casing: { color: '#80A7C2', extra: 1.5 },
            bands: [{ from: -1, to: 1, color: '#AADAFF' }], markings: [] },
        stream: { defaultWidth: 16, casing: { color: '#80A7C2', extra: 2 },
            bands: [{ from: -1, to: 1, color: '#AADAFF' }], markings: [] },
        river: { defaultWidth: 38, casing: { color: '#6f9ab8', extra: 3 },
            bands: [{ from: -1, to: 1, color: '#81B3D5' }], markings: [] },
        canal: { defaultWidth: 22, casing: { color: '#5d7d92', extra: 2 },
            bands: [{ from: -1, to: 1, color: '#81B3D5' }], markings: [], straight: true },
        estuary: { defaultWidth: 84, casing: { color: '#7a8b76', extra: 4 },
            bands: [{ from: -1, to: 1, color: '#9fb8c9' }], markings: [] },
    },
};

function splineProfile(kind, preset) {
    // "custom:<id>" → a user-authored profile from mapData.customProfiles,
    // normalised into the builtin profile shape the renderer expects.
    if (preset && preset.indexOf('custom:') === 0) {
        const id = preset.slice(7);
        const cp = (mapData.customProfiles || []).find(p => p.id === id);
        if (cp) return {
            defaultWidth: cp.defaultWidth || 24,
            casing: { color: cp.casingColor || '#3f3413', extra: cp.casingExtra == null ? 3 : cp.casingExtra },
            bands: (cp.bands && cp.bands.length) ? cp.bands : [{ from: -1, to: 1, color: '#cccccc' }],
            markings: cp.markings || [],
            straight: !!cp.straight,
        };
    }
    const table = SPLINE_PROFILES[kind] || SPLINE_PROFILES.road;
    return table[preset] || Object.values(table)[0];
}

function findSpline(splineId) {
    let found = null;
    walkNodes(mapData.layers, n => {
        if (!found) found = (n.splines || []).find(s => s.id === splineId);
    });
    return found || null;
}

function findSplineOwner(splineId) {
    let owner = null;
    walkNodes(mapData.layers, n => {
        if (!owner && (n.splines || []).some(s => s.id === splineId)) owner = n;
    });
    return owner;
}

// Centripetal Catmull-Rom: returns densely-sampled {x,y,w,seg,t} points.
// seg = lower knot index of the segment this sample belongs to; t = fraction
// (0..1) within that knot-segment — used for per-knot type cross-fading.
function sampleSpline(points, straight, closed) {
    if (!points || points.length === 0) return [];
    if (points.length === 1)
        return [{ x: points[0].x, y: points[0].y, w: points[0].width || 24, seg: 0, t: 0 }];
    const n = points.length;
    const loop = !!closed && n >= 3;        // Catmull-Rom wrap needs 3+ knots
    const out = [];
    if (straight || n === 2) {
        const wrap = !!closed && n >= 2;
        const segs = wrap ? n : n - 1;
        for (let i = 0; i < segs; i++) {
            const a = points[i], b = points[(i + 1) % n];
            const steps = 12;
            for (let s = 0; s < steps; s++) {
                const t = s / steps;
                out.push({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t,
                           w: (a.width || 24) + ((b.width || 24) - (a.width || 24)) * t,
                           seg: i, t });
            }
        }
        const endIdx = wrap ? 0 : n - 1;
        const end = points[endIdx];
        out.push({ x: end.x, y: end.y, w: end.width || 24, seg: segs - 1, t: 1 });
        return out;
    }
    // Hermite spline with per-knot tangents. With sharpness 0 and no angle
    // override the tangents reduce to the centripetal Catmull-Rom tangents, so
    // this matches the previous behaviour exactly.
    const m = knotTangents(points, loop);
    const segs = loop ? n : n - 1;
    for (let i = 0; i < segs; i++) {
        const p1 = points[i];
        const j = loop ? (i + 1) % n : i + 1;
        const p2 = points[j];
        const m1 = m[i], m2 = m[j];
        const w1 = p1.width || 24, w2 = p2.width || 24;
        const steps = 18;
        for (let s = 0; s < steps; s++) {
            const t = s / steps, t2 = t * t, t3 = t2 * t;
            const h00 = 2 * t3 - 3 * t2 + 1, h10 = t3 - 2 * t2 + t;
            const h01 = -2 * t3 + 3 * t2, h11 = t3 - t2;
            const x = h00 * p1.x + h10 * m1.x + h01 * p2.x + h11 * m2.x;
            const y = h00 * p1.y + h10 * m1.y + h01 * p2.y + h11 * m2.y;
            out.push({ x, y, w: w1 + (w2 - w1) * t, seg: i, t });
        }
    }
    const endIdx = loop ? 0 : n - 1;
    const end = points[endIdx];
    out.push({ x: end.x, y: end.y, w: end.width || 24, seg: segs - 1, t: 1 });
    return out;
}

// Per-knot Hermite tangents. Base = centripetal-style cardinal tangent
// 0.5*(next-prev). An optional per-knot `angle` (radians) forces the tangent
// direction; `sharpness` (0..1) scales the magnitude toward zero — at 1 the
// knot becomes a hard corner (straight in, straight out).
function knotTangents(points, closed) {
    const n = points.length;
    const m = [];
    for (let i = 0; i < n; i++) {
        const knot = points[i];
        const prev = closed ? points[(i - 1 + n) % n] : points[Math.max(0, i - 1)];
        const next = closed ? points[(i + 1) % n] : points[Math.min(n - 1, i + 1)];
        let tx = 0.5 * (next.x - prev.x), ty = 0.5 * (next.y - prev.y);
        if (knot.angle != null) {
            let mag = Math.hypot(tx, ty);
            if (mag < 1e-3) {
                const dn = Math.hypot(next.x - knot.x, next.y - knot.y);
                const dp = Math.hypot(knot.x - prev.x, knot.y - prev.y);
                mag = 0.5 * (Math.max(dn, dp) || 24);
            }
            tx = Math.cos(knot.angle) * mag;
            ty = Math.sin(knot.angle) * mag;
        }
        const sharp = knot.sharpness || 0;
        m.push({ x: tx * (1 - sharp), y: ty * (1 - sharp) });
    }
    return m;
}

// Linear-interpolate two #rrggbb colours.
function lerpColor(a, b, t) {
    const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
    const ar = (pa >> 16) & 255, ag = (pa >> 8) & 255, ab = pa & 255;
    const br = (pb >> 16) & 255, bg = (pb >> 8) & 255, bb = pb & 255;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bl = Math.round(ab + (bb - ab) * t);
    return '#' + ((1 << 24) | (r << 16) | (g << 8) | bl).toString(16).slice(1);
}

// Resolve the profile for one knot, honouring its optional type override.
function knotProfile(spline, knotIdx) {
    const knot = spline.points[Math.max(0, Math.min(spline.points.length - 1, knotIdx))];
    return splineProfile(spline.kind, (knot && knot.typeOverride) || spline.preset);
}

// Remap the raw segment fraction by the spline's blend factor:
// b=1 → linear (full smooth), b=0 → hard step at the midpoint,
// in between → the transition is compressed into the middle `b` of the segment.
function blendT(t, b) {
    if (b >= 1) return t;
    if (b <= 0) return t < 0.5 ? 0 : 1;
    return Math.max(0, Math.min(1, (t - 0.5) / b + 0.5));
}

// Blended visual at a sample: cross-fades casing + fill colours between the
// two knots bounding the sample's segment (so a spline can morph type-to-type).
// A segment's blend softness is the MIN of its two knots' factors — so dialling
// one knot's slider down hardens both segments touching it.
function knotBlendFactor(knot) {
    return (knot && knot.blendFactor != null) ? knot.blendFactor : 1;
}
// Cross-fade context at a sample: the two bounding knots' profiles + the
// blend-remapped fraction. Pass-level code lerps casing / bands from this.
function sampleBlend(spline, sample) {
    const N = spline.points.length;
    const segB = spline.closed ? (sample.seg + 1) % N : sample.seg + 1;
    const pA = knotProfile(spline, sample.seg);
    const pB = knotProfile(spline, segB);
    const bf = Math.min(knotBlendFactor(spline.points[sample.seg]),
                        knotBlendFactor(spline.points[segB]));
    return { pA, pB, t: blendT(sample.t, bf) };
}
function sampleVisual(spline, sample) {
    const { pA, pB, t } = sampleBlend(spline, sample);
    return {
        casingColor: lerpColor(pA.casing.color, pB.casing.color, t),
        casingExtra: pA.casing.extra + (pB.casing.extra - pA.casing.extra) * t,
    };
}

// Quad path between two samples at a given half-width fraction (+ extra world units).
function segQuad(s0, n0, s1, n1, frac, extra) {
    const o0 = (s0.w / 2) * frac + extra;
    const o1 = (s1.w / 2) * frac + extra;
    const l0x = (s0.x + n0.x * o0) * zoom, l0y = (s0.y + n0.y * o0) * zoom;
    const l1x = (s1.x + n1.x * o1) * zoom, l1y = (s1.y + n1.y * o1) * zoom;
    const r0x = (s0.x - n0.x * o0) * zoom, r0y = (s0.y - n0.y * o0) * zoom;
    const r1x = (s1.x - n1.x * o1) * zoom, r1y = (s1.y - n1.y * o1) * zoom;
    return `M${l0x.toFixed(1)},${l0y.toFixed(1)} L${l1x.toFixed(1)},${l1y.toFixed(1)} ` +
           `L${r1x.toFixed(1)},${r1y.toFixed(1)} L${r0x.toFixed(1)},${r0y.toFixed(1)} Z`;
}

// Quad spanning two arbitrary half-width fractions (a band's from→to edges).
function segQuadBand(s0, n0, s1, n1, from, to) {
    const a0 = (s0.w / 2) * from, b0 = (s0.w / 2) * to;
    const a1 = (s1.w / 2) * from, b1 = (s1.w / 2) * to;
    const ax0 = (s0.x + n0.x * a0) * zoom, ay0 = (s0.y + n0.y * a0) * zoom;
    const bx0 = (s0.x + n0.x * b0) * zoom, by0 = (s0.y + n0.y * b0) * zoom;
    const ax1 = (s1.x + n1.x * a1) * zoom, ay1 = (s1.y + n1.y * a1) * zoom;
    const bx1 = (s1.x + n1.x * b1) * zoom, by1 = (s1.y + n1.y * b1) * zoom;
    return `M${ax0.toFixed(1)},${ay0.toFixed(1)} L${ax1.toFixed(1)},${ay1.toFixed(1)} ` +
           `L${bx1.toFixed(1)},${by1.toFixed(1)} L${bx0.toFixed(1)},${by0.toFixed(1)} Z`;
}

// Per-sample unit normals (perpendicular to the tangent).
// When closed, the sample list's last entry duplicates the first, so the
// cyclic neighbour lookup spans length-1 to skip that duplicate.
function sampleNormals(samples, closed) {
    const normals = [];
    const m = samples.length;
    const cyc = closed ? m - 1 : m;
    for (let i = 0; i < m; i++) {
        let pi, ni;
        if (closed) {
            pi = ((i - 1) % cyc + cyc) % cyc;
            ni = (i + 1) % cyc;
        } else {
            pi = Math.max(0, i - 1);
            ni = Math.min(m - 1, i + 1);
        }
        const prev = samples[pi], next = samples[ni];
        let tx = next.x - prev.x, ty = next.y - prev.y;
        const len = Math.hypot(tx, ty) || 1;
        tx /= len; ty /= len;
        normals.push({ x: -ty, y: tx }); // rotate tangent 90°
    }
    return normals;
}

// Build an SVG path 'd' for a band polygon between two half-width fractions.
function bandPath(samples, normals, fromFrac, toFrac, extra) {
    const left = [], right = [];
    for (let i = 0; i < samples.length; i++) {
        const s = samples[i], nrm = normals[i];
        const half = s.w / 2;
        const outer = half * toFrac + (toFrac >= 0 ? extra : -extra);
        const inner = half * fromFrac + (fromFrac >= 0 ? extra : -extra);
        left.push([(s.x + nrm.x * outer) * zoom, (s.y + nrm.y * outer) * zoom]);
        right.push([(s.x + nrm.x * inner) * zoom, (s.y + nrm.y * inner) * zoom]);
    }
    let d = 'M' + left.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' L');
    d += ' L' + right.reverse().map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' L');
    return d + ' Z';
}

// Build an SVG path 'd' for a marking line at an offset fraction of half-width.
function markingPath(samples, normals, offsetFrac) {
    const pts = [];
    for (let i = 0; i < samples.length; i++) {
        const s = samples[i], nrm = normals[i];
        const o = (s.w / 2) * offsetFrac;
        pts.push([(s.x + nrm.x * o) * zoom, (s.y + nrm.y * o) * zoom]);
    }
    return 'M' + pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' L');
}

function sendMessage(msg) {
    try {
        const json = JSON.stringify(msg);
        if (typeof invokeCSharpAction === 'function') invokeCSharpAction(json);
        else if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(json);
        else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.webview)
            window.webkit.messageHandlers.webview.postMessage(json);
    } catch (e) { console.error(e); }
}

function log(msg) {
    console.log('[Map]', msg);
    sendMessage({ type: 'log', text: String(msg) });
}

window.addEventListener('error', e => log('window.error: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + (e.error && e.error.stack ? '\n' + e.error.stack : '')));
window.addEventListener('unhandledrejection', e => {
    const r = e && e.reason;
    log('unhandledrejection: ' + (r && r.stack ? r.stack : (r && r.message ? r.message : String(r))));
});

let lastZoomApplied = -1;
function applyTransform() {
    // #world only translates by pan. Each image's transform encodes its own zoom
    // so the browser re-rasterizes the image at the current zoom (no GPU bitmap
    // stretch from a cached world-scale layer = sharper zoom-in).
    world.style.transform = `translate(${pan.x}px, ${pan.y}px)`;
    updateHud();
    repositionPins();
    repositionLabels();
    if (zoom !== lastZoomApplied) {
        lastZoomApplied = zoom;
        applyZoomToAllImages();
        applyZoomToAllTerrain(); // terrain + building <svg> paths are world-unit, scaled by zoom
        refreshBuildingsForZoom(); // roof ↔ floor-plan switch at planMinZoom
        renderSplines(); // spline geometry is authored in world*zoom coords
    }
    // Must run AFTER renderSplines — that wipes + rebuilds the spline SVG, so
    // the layer hide / opacity cascade has to be re-applied to the fresh nodes.
    updateLayerVisibility();
    refreshBorder(); // clip-path + outline track pan / zoom
    renderFloorSelectors(); // inline floor controls track pan / zoom
    renderFloorAnnotations(); // active-floor labels / pins re-evaluated for the new zoom
    updateImageHandles();
    if (clipEdit) renderClipEditor();
    if (splineDraft || splineEdit) renderSplineEditor();
    if (terrainDraft || terrainEdit) renderTerrainEditor();
    if (borderDraft || borderEdit) renderBorderEditor();
    renderBuildingEditor(); // building rotation handle — after updateImageHandles (it clears the overlay)
}

// Terrain shape + building <svg>s carry world-unit geometry; the current zoom
// is applied as a CSS scale (mirrors how images encode their own zoom).
function applyZoomToAllTerrain() {
    Array.from(world.querySelectorAll('.nv-terrain, .nv-building')).forEach(el => {
        el.style.transform = `scale(${zoom})`;
    });
}

function applyZoomToAllImages() {
    Array.from(world.querySelectorAll('.nv-image')).forEach(el => {
        const lid = el.dataset.layerId;
        const iid = el.dataset.imageId;
        const layer = findLayer(lid);
        if (!layer) return;
        const img = (layer.images || []).find(i => i.id === iid);
        if (!img) return;
        applyImageTransform(el, img);
    });
}

// ── Recursive layer-tree helpers ────────────────────────────────────────
// mapData.layers is a tree of nodes. A node with children[] acts as a group;
// images[] may live on any node. Group behaviors (isConnectedSet) only matter
// when a node has children.

// Non-persisted isolate state: when set, ONLY this one element renders.
let isolatedKind = null;   // 'image' | 'spline' | 'pin' | 'label'
let isolatedId = null;

function walkNodes(nodes, cb, parents) {
    parents = parents || [];
    for (const n of nodes || []) {
        cb(n, parents);
        if (n.children && n.children.length) walkNodes(n.children, cb, parents.concat(n));
    }
}

function findLayer(layerId) {
    let found = null;
    walkNodes(mapData.layers, n => { if (n.id === layerId) found = n; });
    return found;
}

function findImageNode(imageId) {
    let found = null;
    walkNodes(mapData.layers, n => {
        if (!found && (n.images || []).some(i => i.id === imageId)) found = n;
    });
    return found;
}

// Effective per-node state: visibility + opacity, cascaded from ancestors.
// Returns Map<nodeId, { visible:bool, opacity:number, locked:bool }>.
function computeNodeState() {
    const state = new Map();
    function recurse(nodes, parentVisible, parentOpacity, parentLocked) {
        for (const n of nodes || []) {
            let visible = parentVisible && !n.hidden;
            if (n.minZoom != null && zoom < n.minZoom) visible = false;
            if (n.maxZoom != null && zoom > n.maxZoom) visible = false;
            const opacity = parentOpacity * (n.opacity ?? 1);
            const locked = parentLocked || !!n.locked;
            state.set(n.id, { visible, opacity, locked });
            // Connected set: only the active child is visible.
            const isConnected = n.isConnectedSet && n.children && n.children.length;
            const activeChildId = isConnected
                ? (n.defaultMemberLayerId || (n.children[0] && n.children[0].id))
                : null;
            for (const c of n.children || []) {
                const childParentVisible = visible && (!isConnected || c.id === activeChildId);
                recurse([c], childParentVisible, opacity, locked);
            }
        }
    }
    recurse(mapData.layers, true, 1, false);
    return state;
}

// Resolve a map element object by kind + id (for zoom-range / isolate checks).
function elementById(kind, id) {
    if (kind === 'spline') return findSpline(id);
    if (kind === 'pin') return findPinById(id);
    if (kind === 'label') return findLabelById(id);
    if (kind === 'shape') return findShape(id);
    if (kind === 'building') return findBuilding(id);
    return null;
}

function updateLayerVisibility() {
    const state = computeNodeState();
    Array.from(world.querySelectorAll('.nv-image')).forEach(el => {
        const lid = el.dataset.layerId;
        const st = state.get(lid);
        let show;
        if (isolatedId) {
            // Isolate: show ONLY the isolated element, nothing else.
            show = isolatedKind === 'image' && el.dataset.imageId === isolatedId;
            el.style.display = show ? '' : 'none';
            if (show) el.style.opacity = 1;
            return;
        }
        show = st ? st.visible : true;
        if (show) {
            const node = findLayer(lid);
            const img = node && (node.images || []).find(i => i.id === el.dataset.imageId);
            if (img) {
                if (img.minZoom != null && zoom < img.minZoom) show = false;
                if (img.maxZoom != null && zoom > img.maxZoom) show = false;
            }
        }
        el.style.display = show ? '' : 'none';
        if (show && st) el.style.opacity = st.opacity;
    });
    // Spline parts, pins and labels follow their owning layer's visibility +
    // opacity cascade plus their own per-element zoom range. An element with no
    // layerId (legacy / unassigned) ignores the layer cascade. While anything
    // is isolated, only the isolated element renders.
    function cascade(els, kind, idAttr) {
        for (const el of els) {
            // Floor-scoped labels / pins are owned by renderFloorAnnotations —
            // it only creates them when their building/floor should show, so the
            // layer + isolate cascade must leave them alone.
            if (el.dataset.floorBld) continue;
            const elId = el.dataset[idAttr];
            if (isolatedId) {
                const match = isolatedKind === kind && elId === isolatedId;
                el.style.display = match ? '' : 'none';
                if (match) el.style.opacity = 1;
                continue;
            }
            const lid = el.dataset.layerId;
            let show = true, op = '';
            if (lid) {
                const st = state.get(lid);
                show = st ? st.visible : true;
                op = (show && st) ? st.opacity : '';
            }
            if (show) {
                const obj = elementById(kind, elId);
                if (obj) {
                    if (obj.minZoom != null && obj.minZoom > 0 && zoom < obj.minZoom) show = false;
                    if (obj.maxZoom != null && obj.maxZoom > 0 && zoom > obj.maxZoom) show = false;
                }
            }
            el.style.display = show ? '' : 'none';
            // Only set an inline opacity when the layer is actually dimmed.
            // Setting opacity (even 1) on every per-segment spline quad makes
            // the browser composite each quad on its own → the anti-aliased
            // edges between adjacent quads stop blending and show as faint
            // seam lines. Leaving it unset lets the whole SVG raster in one pass.
            if (show) el.style.opacity = (op !== '' && op < 1) ? op : '';
        }
    }
    cascade(splineSvg.querySelectorAll('.nv-spline-part'), 'spline', 'splineId');
    cascade(pinOverlay.querySelectorAll('.nv-pin-host'), 'pin', 'pinId');
    cascade(labelOverlay.querySelectorAll('.nv-label'), 'label', 'labelId');
    cascade(world.querySelectorAll('.nv-terrain'), 'shape', 'shapeId');
    cascade(world.querySelectorAll('.nv-building'), 'building', 'buildingId');
}

function renderSplines() {
    splineSvg.innerHTML = '';
    const casingG = document.createElementNS(SVG_NS, 'g');
    const fillG = document.createElementNS(SVG_NS, 'g');
    const markG = document.createElementNS(SVG_NS, 'g');
    const items = [];
    walkNodes(mapData.layers, node => {
        for (const sp of node.splines || []) items.push({ node, sp });
    });
    // Live preview of the in-progress draft.
    if (splineDraft && splineDraft.points.length >= 2) {
        items.push({ node: { id: '__draft__' }, sp: {
            id: '__draft__', kind: splineDraft.kind, preset: splineDraft.preset,
            points: splineDraft.points, closed: false,
        } });
    }
    function makePath(d, layerId, splineId) {
        const p = document.createElementNS(SVG_NS, 'path');
        p.setAttribute('d', d);
        p.classList.add('nv-spline-part');
        p.dataset.layerId = layerId;
        p.dataset.splineId = splineId;
        return p;
    }
    // Paint a per-segment quad. The quad is also stroked in its own fill colour
    // so the ~1px anti-aliased gap between abutting quads (which otherwise shows
    // as faint perpendicular seam lines) is covered.
    function seamFill(p, color) {
        p.setAttribute('fill', color);
        p.setAttribute('stroke', color);
        p.setAttribute('stroke-width', '1');
        p.setAttribute('stroke-linejoin', 'round');
    }
    function makeCircle(cx, cy, r, fill, layerId, splineId) {
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('cx', cx.toFixed(1));
        c.setAttribute('cy', cy.toFixed(1));
        c.setAttribute('r', Math.max(0, r).toFixed(1));
        c.setAttribute('fill', fill);
        c.classList.add('nv-spline-part');
        c.dataset.layerId = layerId;
        c.dataset.splineId = splineId;
        return c;
    }
    function hit(p, splineId) {
        // Make a part clickable (delegated listeners on splineSvg do the rest).
        if (splineId !== '__draft__') { p.style.pointerEvents = 'auto'; p.style.cursor = 'pointer'; }
        return p;
    }
    // A spline with no per-knot type override has ONE uniform profile along its
    // whole length → its casing and each fill band can be a single polygon
    // instead of one quad per sample (~150 paths → ~3). Big node-count win.
    function splineUniform(sp) {
        return !(sp.points || []).some(p => p.typeOverride);
    }
    // Cache geometry once per spline.
    for (const it of items) {
        const baseProf = splineProfile(it.sp.kind, it.sp.preset);
        it.prof = baseProf;
        it.uniform = splineUniform(it.sp);
        it.samples = sampleSpline(it.sp.points, baseProf.straight, it.sp.closed);
        it.normals = it.samples.length >= 2 ? sampleNormals(it.samples, it.sp.closed) : null;
    }
    // Pass 1: casings. Drawn first → overlapping splines merge. Uniform splines
    // emit one polygon; only splines with a per-knot type override fall back to
    // per-segment quads (needed for the casing-colour cross-fade).
    for (const { node, sp, prof, uniform, samples, normals } of items) {
        if (!normals) continue;
        if (uniform) {
            const p = makePath(bandPath(samples, normals, -1, 1, prof.casing.extra), node.id, sp.id);
            p.setAttribute('fill', sp.casingColor || prof.casing.color);
            casingG.appendChild(p);
        } else {
            for (let i = 0; i < samples.length - 1; i++) {
                const v = sampleVisual(sp, samples[i]);
                const p = makePath(segQuad(samples[i], normals[i], samples[i + 1], normals[i + 1],
                    1, v.casingExtra), node.id, sp.id);
                seamFill(p, sp.casingColor || v.casingColor);
                casingG.appendChild(p);
            }
        }
        // Junction caps: round the casing ends of an open spline so a road/river
        // stub doesn't terminate in a hard square edge.
        if (!sp.closed && samples.length >= 2) {
            for (const s of [samples[0], samples[samples.length - 1]]) {
                const v = sampleVisual(sp, s);
                const r = (s.w / 2 + v.casingExtra) * zoom;
                casingG.appendChild(makeCircle(s.x * zoom, s.y * zoom, r,
                    sp.casingColor || v.casingColor, node.id, sp.id));
            }
        }
    }
    // Pass 2: fill bands. Uniform splines emit one polygon per band; splines
    // with a per-knot type override fall back to per-segment quads so the
    // per-knot colour cross-fade still works.
    for (const { node, sp, prof, uniform, samples, normals } of items) {
        if (!normals) continue;
        // Closed rivers are bodies of water — fill the enclosed area, not just
        // the width-band ring. (Closed roads stay rings: roundabouts.)
        if (sp.closed && sp.kind === 'river' && samples.length >= 3) {
            let d = 'M';
            for (let i = 0; i < samples.length; i++)
                d += (i ? ' L' : '') + (samples[i].x * zoom).toFixed(1) + ',' + (samples[i].y * zoom).toFixed(1);
            d += ' Z';
            const prof0 = knotProfile(sp, 0);
            const surf = (prof0.bands || []).find(b => b.from <= 0 && b.to >= 0) || (prof0.bands || [])[0];
            const interior = makePath(d, node.id, sp.id);
            interior.setAttribute('fill', sp.fillColor || (surf ? surf.color : '#3b6ea5'));
            fillG.appendChild(hit(interior, sp.id));
        }
        if (uniform) {
            for (const ba of prof.bands) {
                const p = makePath(bandPath(samples, normals, ba.from, ba.to, 0), node.id, sp.id);
                p.setAttribute('fill', sp.fillColor || ba.color);
                fillG.appendChild(hit(p, sp.id));
            }
        } else {
            for (let i = 0; i < samples.length - 1; i++) {
                const { pA, pB, t } = sampleBlend(sp, samples[i]);
                const bands = pA.bands;
                for (let bi = 0; bi < bands.length; bi++) {
                    const ba = bands[bi];
                    const bb = pB.bands[Math.min(bi, pB.bands.length - 1)] || ba;
                    const color = sp.fillColor || lerpColor(ba.color, bb.color, t);
                    const p = makePath(segQuadBand(samples[i], normals[i],
                        samples[i + 1], normals[i + 1], ba.from, ba.to), node.id, sp.id);
                    seamFill(p, color);
                    fillG.appendChild(hit(p, sp.id));
                }
            }
        }
        // Round the fill surface at open-spline ends to match the casing cap.
        if (!sp.closed && samples.length >= 2) {
            const ends = [
                { s: samples[0], prof: knotProfile(sp, 0) },
                { s: samples[samples.length - 1], prof: knotProfile(sp, sp.points.length - 1) },
            ];
            for (const { s, prof } of ends) {
                const bands = prof.bands || [];
                const surface = bands.find(b => b.from <= 0 && b.to >= 0) || bands[0];
                if (!surface) continue;
                const ext = Math.max(Math.abs(surface.from), Math.abs(surface.to));
                const r = (s.w / 2) * ext * zoom;
                fillG.appendChild(makeCircle(s.x * zoom, s.y * zoom, r,
                    sp.fillColor || surface.color, node.id, sp.id));
            }
        }
    }
    // Pass 3: lane markings.
    //  - Edge ("fog") lines come straight from the preset, drawn over the whole
    //    spline (they don't vary per knot).
    //  - The centerline is per-knot ( points[i].markingStyle || sp.markingStyle ).
    //    Across a segment where the two knots' styles differ, the centerline
    //    cross-fades using the same blend factor as the type blend.
    function emitMarking(mk, ss, sn, layerId, splineId, opacity, colorOverride) {
        const p = makePath(markingPath(ss, sn, mk.offset), layerId, splineId);
        p.setAttribute('fill', 'none');
        p.setAttribute('stroke', colorOverride || mk.color);
        p.setAttribute('stroke-width', mk.width);
        if (mk.dash) p.setAttribute('stroke-dasharray', mk.dash.join(' '));
        if (opacity != null && opacity < 1) p.setAttribute('opacity', opacity.toFixed(3));
        markG.appendChild(p);
    }
    for (const { node, sp, prof, samples, normals } of items) {
        if (!normals) continue;
        const mColor = sp.markingColor || null;
        for (const mk of presetEdgeMarkings(prof)) {
            emitMarking(mk, samples, normals, node.id, sp.id, 1, mColor);
        }
        // Fast path: no per-knot centerline override → one centre marking over
        // the whole spline instead of one per knot-segment.
        if (!sp.points.some(p => p.markingStyle)) {
            for (const mk of centerMarkingsForStyle(prof, sp.markingStyle || ''))
                emitMarking(mk, samples, normals, node.id, sp.id, 1, mColor);
            continue;
        }
        const N = sp.points.length;
        const segCount = sp.closed ? N : N - 1;
        for (let seg = 0; seg < segCount; seg++) {
            const nextIdx = (seg + 1) % N;
            const styleA = sp.points[seg].markingStyle || sp.markingStyle || '';
            const styleB = sp.points[nextIdx].markingStyle || sp.markingStyle || '';
            const marksA = centerMarkingsForStyle(prof, styleA);
            const marksB = centerMarkingsForStyle(prof, styleB);
            // Samples in this knot-segment, plus the first sample of the next so
            // the line is continuous across the knot.
            const segSamples = [], segNormals = [];
            for (let i = 0; i < samples.length; i++) {
                if (samples[i].seg === seg) { segSamples.push(samples[i]); segNormals.push(normals[i]); }
                else if (samples[i].seg === seg + 1 && segSamples.length) {
                    segSamples.push(samples[i]); segNormals.push(normals[i]); break;
                }
            }
            if (segSamples.length < 2) continue;
            if (styleA === styleB) {
                for (const mk of marksA) emitMarking(mk, segSamples, segNormals, node.id, sp.id, 1, mColor);
                continue;
            }
            // Styles differ → cross-fade. Split the segment into sub-spans and
            // step the opacity between the two marking sets per blendT().
            const bf = Math.min(knotBlendFactor(sp.points[seg]), knotBlendFactor(sp.points[nextIdx]));
            const SUB = 8;
            const n = segSamples.length;
            for (let k = 0; k < SUB; k++) {
                const i0 = Math.floor(k / SUB * (n - 1));
                const i1 = Math.floor((k + 1) / SUB * (n - 1)) + 1;
                const ss = segSamples.slice(i0, i1);
                const sn = segNormals.slice(i0, i1);
                if (ss.length < 2) continue;
                const bt = blendT((k + 0.5) / SUB, bf);
                for (const mk of marksA) emitMarking(mk, ss, sn, node.id, sp.id, 1 - bt, mColor);
                for (const mk of marksB) emitMarking(mk, ss, sn, node.id, sp.id, bt, mColor);
            }
        }
    }
    splineSvg.appendChild(casingG);
    splineSvg.appendChild(fillG);
    splineSvg.appendChild(markG);
}

// Edge (offset != 0) markings from the preset — never restyled.
function presetEdgeMarkings(prof) {
    return (prof.markings || []).filter(m => m.offset !== 0);
}

// Centerline marking set for a style: "" = the preset's own offset-0 markings,
// else a generated style. Used per knot-segment.
function centerMarkingsForStyle(prof, style) {
    const base = prof.markings || [];
    const centerSrc = base.find(m => m.offset === 0);
    if (!style) return base.filter(m => m.offset === 0);
    const col = centerSrc ? centerSrc.color : '#ffffff';
    const gap = 0.045; // half-width fraction between paired lines
    if (style === 'none') return [];
    if (style === 'single') return [{ offset: 0, color: col, width: 1.8 }];
    if (style === 'dashed') return [{ offset: 0, color: col, width: 1.6, dash: [12, 10] }];
    if (style === 'double') return [
        { offset: -gap, color: col, width: 1.5 },
        { offset: gap, color: col, width: 1.5 }];
    if (style === 'solid-dashed') return [
        { offset: -gap, color: col, width: 1.5 },
        { offset: gap, color: col, width: 1.5, dash: [12, 10] }];
    return base.filter(m => m.offset === 0);
}

window.setSplineMarkingStyle = (splineId, style) => {
    const sp = findSpline(splineId);
    if (!sp) return;
    if (style) sp.markingStyle = style;
    else delete sp.markingStyle;
    renderSplines();
    sendMessage({ type: 'mapChanged' });
};

// Per-spline part colour overrides. Empty string clears an override (revert to
// the preset). All three are set together from the properties-panel pickers.
window.setSplineColors = (splineId, casing, fill, marking) => {
    const sp = findSpline(splineId);
    if (!sp) return;
    const cleared = !casing && !fill && !marking;
    if (casing) sp.casingColor = casing; else delete sp.casingColor;
    if (fill) sp.fillColor = fill; else delete sp.fillColor;
    if (marking) sp.markingColor = marking; else delete sp.markingColor;
    renderSplines();
    // Reset (all empty) → re-emit so the host's colour pickers snap to the preset.
    if (cleared && splineEdit && splineEdit.splineId === splineId) emitSplineSelection();
    sendMessage({ type: 'mapChanged' });
};

window.setKnotMarkingStyle = (splineId, knotIdx, style) => {
    const sp = findSpline(splineId);
    if (!sp || !sp.points[knotIdx]) return;
    if (style) sp.points[knotIdx].markingStyle = style;
    else delete sp.points[knotIdx].markingStyle;
    renderSplines();
    if (splineEdit && splineEdit.splineId === splineId) emitSplineSelection();
    sendMessage({ type: 'mapChanged' });
};

// Single-channel colour setters used by the bottom-bar pickers; each rebuilds
// via setSplineColors so override semantics stay consistent.
window.setSplineCasingColor  = (id, hex) => { const sp = findSpline(id); if (sp) window.setSplineColors(id, hex || '', sp.fillColor || '', sp.markingColor || ''); };
window.setSplineFillColor    = (id, hex) => { const sp = findSpline(id); if (sp) window.setSplineColors(id, sp.casingColor || '', hex || '', sp.markingColor || ''); };
window.setSplineMarkingColor = (id, hex) => { const sp = findSpline(id); if (sp) window.setSplineColors(id, sp.casingColor || '', sp.fillColor || '', hex || ''); };
window.resetSplineColors     = (id) => window.setSplineColors(id, '', '', '');

// Place-pin mode short-circuits ALL element interactions: any left-click drops a pin,
// even on top of images or other pins. Returns true if the click was consumed.
function tryPlacePin(e) {
    if (toolMode !== 'add-pin' || mode !== 'edit') return false;
    if (e.button !== 0) return false;
    e.stopPropagation();
    e.preventDefault();
    const wx = (e.clientX - pan.x) / zoom;
    const wy = (e.clientY - pan.y) / zoom;
    sendMessage({ type: 'placePinAt', x: wx, y: wy });
    return true;
}

// Label tool: any left-click drops a new (empty) text label right where you
// clicked and immediately puts it into inline-edit mode so you can type. The
// tool is one-shot — it returns to the select tool after placing.
function tryPlaceLabel(e) {
    if (toolMode !== 'add-label' || mode !== 'edit') return false;
    if (e.button !== 0) return false;
    e.stopPropagation();
    e.preventDefault();
    const wx = (e.clientX - pan.x) / zoom;
    const wy = (e.clientY - pan.y) / zoom;
    const lbl = { id: 'label-' + Date.now(), x: wx, y: wy,
                  text: '', fontSize: 18, fontFamily: '', align: 'center', color: '#ffffff',
                  layerId: activeLayerId || '' };
    mapData.labels = mapData.labels || [];
    mapData.labels.push(lbl);
    const el = renderLabel(lbl);
    toolMode = 'select';
    stage.style.cursor = 'default';
    sendMessage({ type: 'cancelLabelPlace' }); // host clears IsLabelPlaceMode
    beginLabelEdit(lbl, el);
    return true;
}

function repositionPins() {
    const hosts = pinOverlay.querySelectorAll('.nv-pin-host');
    hosts.forEach(host => {
        const x = parseFloat(host.dataset.worldX) || 0;
        const y = parseFloat(host.dataset.worldY) || 0;
        host.style.left = (pan.x + x * zoom) + 'px';
        host.style.top  = (pan.y + y * zoom) + 'px';
    });
}

function repositionLabels() {
    labelOverlay.querySelectorAll('.nv-label').forEach(el => {
        const x = parseFloat(el.dataset.worldX) || 0;
        const y = parseFloat(el.dataset.worldY) || 0;
        const fs = parseFloat(el.dataset.fontSize) || 18;
        el.style.left = (pan.x + x * zoom) + 'px';
        el.style.top  = (pan.y + y * zoom) + 'px';
        el.style.fontSize = (fs * zoom) + 'px';
    });
}

function setMapData(json) {
    closeContextMenu();
    try { mapData = JSON.parse(json) || { layers: [], pins: [] }; }
    catch (e) { mapData = { layers: [], pins: [] }; log('setMapData parse error: ' + e.message); }
    if (!mapData.layers) mapData.layers = [];
    if (!mapData.pins) mapData.pins = [];
    if (!mapData.labels) mapData.labels = [];
    if (!mapData.customProfiles) mapData.customProfiles = [];
    const rect = stage.getBoundingClientRect();
    pan.x = mapData.initialView?.centerX || (rect.width / 2);
    pan.y = mapData.initialView?.centerY || (rect.height / 2);
    zoom = mapData.initialView?.zoom || 1;
    let nodeCount = 0, imageCount = 0;
    walkNodes(mapData.layers, n => { nodeCount++; imageCount += (n.images || []).length; });
    log(`setMapData nodes=${nodeCount} images=${imageCount} pins=${(mapData.pins || []).length} stage=${rect.width}x${rect.height} pan=${pan.x},${pan.y} zoom=${zoom}`);
    render();
}

function setImageBaseUrl(url) {
    imageBaseUrl = url || '';
    log('setImageBaseUrl = ' + imageBaseUrl);
    render();
}

function setMode(m) {
    mode = m === 'view' ? 'view' : 'edit';
    document.body.classList.toggle('mode-edit', mode === 'edit');
    document.body.classList.toggle('mode-view', mode === 'view');
}

function render() {
    world.innerHTML = '';
    pinOverlay.innerHTML = '';
    labelOverlay.innerHTML = '';
    // Depth-first walk: terrain shapes then images render in tree order so
    // deeper / later nodes paint on top. updateLayerVisibility() (via
    // applyTransform) handles the hidden / connected-set / zoom-range / isolate
    // cascade afterwards.
    walkNodes(mapData.layers, node => {
        for (const shape of node.shapes || []) renderTerrainShape(node, shape);
        for (const img of node.images || []) renderImage(node, img);
        for (const b of node.buildings || []) renderBuilding(node, b);
    });
    renderSplines();
    world.appendChild(splineSvg); // re-attach after innerHTML wipe; sits above images
    for (const pin of mapData.pins || []) renderPin(pin);
    for (const lbl of mapData.labels || []) renderLabel(lbl);
    renderFloorAnnotations(); // active-floor labels / pins for plan-showing buildings
    lastZoomApplied = -1; // force renderSplines() coords refresh on next applyTransform
    applyTransform();
    // Keep the bottom-bar's gating in sync with the latest data after any rebuild.
    if (typeof renderBottomBar === 'function') renderBottomBar();
}

function applyImageTransform(el, img) {
    // Encode pan-less screen-space rect: image lives inside #world (translated by pan).
    // Per-image transform includes current zoom so changing zoom updates each image
    // independently, forcing the browser to repaint at the new effective resolution.
    const natW = el.naturalWidth || img.width || 1;
    const natH = el.naturalHeight || img.height || 1;
    el.style.width = natW + 'px';
    el.style.height = natH + 'px';
    const w = img.width || natW;
    const h = img.height || natH;
    const z = zoom;
    const sw = w * z;
    const sh = h * z;
    const cx = ((img.x || 0) + w / 2) * z;
    const cy = ((img.y || 0) + h / 2) * z;
    const rot = img.rotation || 0;
    el.style.transform =
        `translate(${cx}px, ${cy}px) rotate(${rot}deg) translate(${-sw / 2}px, ${-sh / 2}px) scale(${sw / natW}, ${sh / natH})`;
    applyClipPath(el, img, natW, natH);
}

function applyClipPath(el, img, natW, natH) {
    if (!img.clipPolygon || img.clipPolygon.length < 3) {
        el.style.clipPath = '';
        return;
    }
    natW = natW || el.naturalWidth || 1;
    natH = natH || el.naturalHeight || 1;
    const pts = img.clipPolygon
        .map(p => `${(p.x / natW * 100).toFixed(3)}% ${(p.y / natH * 100).toFixed(3)}%`)
        .join(',');
    el.style.clipPath = `polygon(${pts})`;
}

function renderImage(layer, img) {
    const el = document.createElement('img');
    el.className = 'nv-image';
    el.draggable = false;
    // Encode each path segment so spaces / non-ASCII chars resolve correctly.
    const encoded = String(img.path || '')
        .split('/')
        .map(s => encodeURIComponent(s))
        .join('/');
    el.src = imageBaseUrl + encoded;
    log(`renderImage path="${img.path}" url="${el.src}" pos=${img.x},${img.y} size=${img.width}x${img.height}`);
    el.addEventListener('load', () => {
        log(`image loaded ok: ${img.path} (natural ${el.naturalWidth}x${el.naturalHeight})`);
        applyImageTransform(el, img);
        updateImageHandles();
    });
    el.addEventListener('error', () => log(`IMAGE LOAD FAILED: ${el.src}`));
    el.style.opacity = layer.opacity ?? 1;
    el.dataset.imageId = img.id;
    el.dataset.layerId = layer.id;
    applyImageTransform(el, img);
    el.addEventListener('mousedown', (e) => {
        // Middle button = pan, always.
        if (e.button === 1) {
            e.preventDefault();
            e.stopPropagation();
            startPan(e);
            return;
        }
        if (trySplinePoint(e)) return;
        if (tryPlacePin(e)) return;
        if (tryPlaceLabel(e)) return;
        if (tryPlaceTerrainPoint(e)) return;
        if (tryPlaceBorderPoint(e)) return;
        if (tryPlaceBuilding(e)) return;
        if (mode !== 'edit' || toolMode !== 'select') return;
        // Locked layer = left-click just clears selection; pan via middle button only.
        if (layer.locked) {
            if (e.button === 0) {
                e.stopPropagation();
                clearSelection();
            }
            return;
        }
        if (e.button === 2) return;
        e.stopPropagation();
        selectImage(layer.id, img.id);
        startImageDrag(e, layer, img, el);
    });
    el.addEventListener('contextmenu', (e) => {
        if (mode !== 'edit') return;
        e.preventDefault();
        e.stopPropagation();
        if (clipEdit && clipEdit.imageId === img.id) return; // right-click is point-delete during clip edit
        selectImage(layer.id, img.id);
        showImageContextMenu(e, layer, img);
    });
    el.addEventListener('dblclick', (e) => {
        if (!clipEdit || clipEdit.imageId !== img.id) return;
        e.stopPropagation();
        const [px, py] = unprojectImagePoint(e.clientX, e.clientY, img, el);
        clipEdit.points.push({ x: px, y: py });
        renderClipEditor();
    });
    world.appendChild(el);
}

function showImageContextMenu(ev, layer, img) {
    closeContextMenu();
    const menu = document.createElement('div');
    menu.className = 'nv-ctx-menu';
    menu.style.left = ev.clientX + 'px';
    menu.style.top = ev.clientY + 'px';
    function item(label, action) {
        const it = document.createElement('div');
        it.textContent = label;
        it.addEventListener('mousedown', e => { e.stopPropagation(); });
        it.addEventListener('click', () => { closeContextMenu(); action(); });
        return it;
    }
    const labels = ctxMenuLabels;
    menu.appendChild(item(labels.clip, () => enterClipEdit(layer.id, img.id)));
    menu.appendChild(item(labels.delete, () => deleteImage(layer.id, img.id)));
    openContextMenu(menu);
}

// Single owner of the active menu DOM + listeners. Capture-phase listeners so
// element handlers calling e.stopPropagation() can't block the close.
let activeContextMenu = null;
function openContextMenu(menuEl) {
    closeContextMenu();
    document.body.appendChild(menuEl);
    activeContextMenu = menuEl;
    // Defer one tick so the right-click's own mousedown doesn't close us immediately.
    setTimeout(() => {
        if (!activeContextMenu) return;
        window.addEventListener('mousedown', onCtxMouseDown, true);
        window.addEventListener('wheel', closeContextMenu, { passive: true });
        window.addEventListener('blur', closeContextMenu);
        window.addEventListener('keydown', onCtxKeyDown, true);
    }, 0);
}
function onCtxMouseDown(e) {
    if (activeContextMenu && activeContextMenu.contains(e.target)) return;
    closeContextMenu();
}
function onCtxKeyDown(e) {
    if (e.key === 'Escape') { e.stopPropagation(); closeContextMenu(); }
}
function closeContextMenu() {
    window.removeEventListener('mousedown', onCtxMouseDown, true);
    window.removeEventListener('wheel', closeContextMenu);
    window.removeEventListener('blur', closeContextMenu);
    window.removeEventListener('keydown', onCtxKeyDown, true);
    if (activeContextMenu) {
        activeContextMenu.remove();
        activeContextMenu = null;
    }
    // Defensive: clean up any stray menu that bypassed openContextMenu.
    const stray = document.querySelector('.nv-ctx-menu');
    if (stray) stray.remove();
}

function deleteImage(layerId, imageId) {
    const layer = findLayer(layerId);
    if (!layer) return;
    layer.images = (layer.images || []).filter(i => i.id !== imageId);
    if (selected?.kind === 'image' && selected.id === imageId) selected = null;
    render();
    sendMessage({ type: 'mapChanged' });
}

function renderPin(pin) {
    const host = document.createElement('div');
    host.className = 'nv-pin-host' + (selected?.kind === 'pin' && selected.id === pin.id ? ' selected' : '');
    host.dataset.pinId = pin.id;
    host.dataset.worldX = pin.x;
    host.dataset.worldY = pin.y;
    host.dataset.layerId = pin.layerId || '';
    // Initial screen position (repositionPins() keeps it in sync afterwards).
    host.style.left = (pan.x + pin.x * zoom) + 'px';
    host.style.top = (pan.y + pin.y * zoom) + 'px';

    if (pin.label) {
        const lbl = document.createElement('div');
        lbl.className = 'nv-pin-label';
        lbl.textContent = pin.label;
        host.appendChild(lbl);
    }
    const marker = document.createElement('div');
    marker.className = 'nv-pin-marker';
    if (pin.color) marker.style.background = pin.color;
    host.appendChild(marker);

    host.addEventListener('mousedown', (e) => {
        if (e.button === 1) {
            e.preventDefault();
            e.stopPropagation();
            startPan(e);
            return;
        }
        if (trySplinePoint(e)) return;
        if (tryPlacePin(e)) return;
        if (tryPlaceLabel(e)) return;
        if (tryPlaceTerrainPoint(e)) return;
        if (tryPlaceBorderPoint(e)) return;
        if (tryPlaceBuilding(e)) return;
        e.stopPropagation();
        if (mode === 'view') {
            sendMessage({ type: 'pinClick', pinId: pin.id, entityId: pin.entityId || '', entityType: pin.entityType || '' });
            return;
        }
        if (e.button === 2) return; // right-click handled below
        if (toolMode !== 'select') return;
        selectPin(pin, host);
        startPinDrag(e, pin, host);
    });
    host.addEventListener('contextmenu', (e) => {
        e.preventDefault(); e.stopPropagation();
        if (mode !== 'edit') return;
        showSimpleContextMenu(e, [
            [mapStrings.ctxDelete, () => deletePin(pin.id)],
        ]);
    });
    pinOverlay.appendChild(host);
}

// Generic JS context menu. `items` is an array of [label, action] pairs;
// a null entry renders a separator.
function showSimpleContextMenu(ev, items) {
    closeContextMenu();
    const menu = document.createElement('div');
    menu.className = 'nv-ctx-menu';
    menu.style.left = ev.clientX + 'px';
    menu.style.top = ev.clientY + 'px';
    for (const entry of items) {
        if (!entry) {
            const sep = document.createElement('div');
            sep.style.cssText = 'height:1px;background:#555;margin:4px 0;';
            menu.appendChild(sep);
            continue;
        }
        const [label, action] = entry;
        const it = document.createElement('div');
        it.textContent = label;
        it.addEventListener('click', () => { closeContextMenu(); action(); });
        menu.appendChild(it);
    }
    openContextMenu(menu);
}

function selectImage(layerId, imageId) {
    if (selected?.kind === 'image' && selected.id === imageId && selected.layerId === layerId) return;
    clearSelection();
    selected = { kind: 'image', id: imageId, layerId: layerId };
    Array.from(world.querySelectorAll('.nv-image')).forEach(el => {
        el.classList.toggle('selected', el.dataset.imageId === imageId && el.dataset.layerId === layerId);
    });
    updateImageHandles();
    const layer = findLayer(layerId);
    const img = layer && (layer.images || []).find(i => i.id === imageId);
    if (img) {
        sendMessage({
            type: 'imageSelected',
            imageId: imageId,
            layerId: layerId,
            minZoom: img.minZoom == null ? 0 : img.minZoom,
            maxZoom: img.maxZoom == null ? 0 : img.maxZoom,
        });
    }
    renderBottomBar();
}

function updateImageHandles() {
    handlesOverlay.innerHTML = '';
    if (mode !== 'edit' || !selected || selected.kind !== 'image') return;
    if (toolMode !== 'select') return; // pin-place / spline tools suppress image handles
    const layer = findLayer(selected.layerId);
    if (!layer || layer.locked || layer.hidden) return;
    const img = (layer.images || []).find(i => i.id === selected.id);
    if (!img) return;

    const sx = pan.x + img.x * zoom;
    const sy = pan.y + img.y * zoom;
    const sw = (img.width || 0) * zoom;
    const sh = (img.height || 0) * zoom;
    const rot = img.rotation || 0;

    // Frame (dashed outline)
    const frame = document.createElement('div');
    frame.className = 'nv-handle-frame';
    frame.style.left = sx + 'px';
    frame.style.top = sy + 'px';
    frame.style.width = sw + 'px';
    frame.style.height = sh + 'px';
    if (rot) frame.style.transform = `rotate(${rot}deg)`;
    handlesOverlay.appendChild(frame);

    // Handle positions in local (unrotated) image space, then rotate around image center.
    const cx = sx + sw / 2, cy = sy + sh / 2;
    const rad = rot * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    const project = (lx, ly) => {
        const dx = lx - cx, dy = ly - cy;
        return [cx + dx * cos - dy * sin, cy + dx * sin + dy * cos];
    };
    const corners = [
        ['nw', sx,           sy],
        ['ne', sx + sw,      sy],
        ['se', sx + sw,      sy + sh],
        ['sw', sx,           sy + sh],
        ['n',  sx + sw / 2,  sy],
        ['e',  sx + sw,      sy + sh / 2],
        ['s',  sx + sw / 2,  sy + sh],
        ['w',  sx,           sy + sh / 2],
    ];
    for (const [dir, hx, hy] of corners) {
        const [px, py] = project(hx, hy);
        const h = document.createElement('div');
        h.className = 'nv-handle ' + dir;
        h.style.left = px + 'px';
        h.style.top = py + 'px';
        h.addEventListener('mousedown', e => startImageResize(e, layer, img, dir));
        handlesOverlay.appendChild(h);
    }
    // Rotation handle: 28px above top-center in local space, then rotated.
    const [rx, ry] = project(sx + sw / 2, sy - 28);
    const rh = document.createElement('div');
    rh.className = 'nv-handle rotate';
    rh.style.left = rx + 'px';
    rh.style.top = ry + 'px';
    rh.addEventListener('mousedown', e => startImageRotate(e, layer, img));
    handlesOverlay.appendChild(rh);
}

function startImageResize(ev, layer, img, dir) {
    ev.stopPropagation();
    ev.preventDefault();
    const start = { mx: ev.clientX, my: ev.clientY, x: img.x, y: img.y, w: img.width, h: img.height };
    const ratio = start.w / Math.max(1, start.h);
    function move(e) {
        const dx = (e.clientX - start.mx) / zoom;
        const dy = (e.clientY - start.my) / zoom;
        let nx = start.x, ny = start.y, nw = start.w, nh = start.h;
        if (dir.includes('e')) nw = Math.max(8, start.w + dx);
        if (dir.includes('w')) { nw = Math.max(8, start.w - dx); nx = start.x + (start.w - nw); }
        if (dir.includes('s')) nh = Math.max(8, start.h + dy);
        if (dir.includes('n')) { nh = Math.max(8, start.h - dy); ny = start.y + (start.h - nh); }
        if (e.shiftKey && nw > 0 && nh > 0) {
            if (Math.abs(dx) > Math.abs(dy)) nh = nw / ratio;
            else nw = nh * ratio;
            if (dir.includes('w')) nx = start.x + (start.w - nw);
            if (dir.includes('n')) ny = start.y + (start.h - nh);
        }
        img.x = nx; img.y = ny; img.width = nw; img.height = nh;
        const el = world.querySelector(`.nv-image[data-image-id="${img.id}"]`);
        if (el) applyImageTransform(el, img);
        updateImageHandles();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

function startImageRotate(ev, layer, img) {
    ev.stopPropagation(); ev.preventDefault();
    const cx = img.x + (img.width || 0) / 2;
    const cy = img.y + (img.height || 0) / 2;
    const scx = pan.x + cx * zoom;
    const scy = pan.y + cy * zoom;
    const startA = Math.atan2(ev.clientY - scy, ev.clientX - scx);
    const startRot = img.rotation || 0;
    function move(e) {
        const a = Math.atan2(e.clientY - scy, e.clientX - scx);
        let deg = startRot + (a - startA) * 180 / Math.PI;
        if (e.shiftKey) deg = Math.round(deg / 15) * 15;
        img.rotation = deg;
        const el = world.querySelector(`.nv-image[data-image-id="${img.id}"]`);
        if (el) applyImageTransform(el, img);
        updateImageHandles();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

function startImageDrag(ev, layer, img, el) {
    const start = { x: ev.clientX, y: ev.clientY, ix: img.x, iy: img.y };
    function move(e) {
        const dx = (e.clientX - start.x) / zoom;
        const dy = (e.clientY - start.y) / zoom;
        img.x = start.ix + dx;
        img.y = start.iy + dy;
        applyImageTransform(el, img);
        updateImageHandles();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

function startPinDrag(ev, pin, host) {
    const start = { x: ev.clientX, y: ev.clientY, px: pin.x, py: pin.y };
    function move(e) {
        const dx = (e.clientX - start.x) / zoom;
        const dy = (e.clientY - start.y) / zoom;
        pin.x = start.px + dx;
        pin.y = start.py + dy;
        host.dataset.worldX = pin.x;
        host.dataset.worldY = pin.y;
        host.style.left = (pan.x + pin.x * zoom) + 'px';
        host.style.top  = (pan.y + pin.y * zoom) + 'px';
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}
