// Move a pin / label / spline to a different layer node.
window.moveMapElementToLayer = (kind, id, targetLayerId) => {
    const target = findLayer(targetLayerId);
    if (!target) return;
    if (kind === 'pin') {
        const pin = (mapData.pins || []).find(p => p.id === id);
        if (pin) pin.layerId = targetLayerId;
    } else if (kind === 'label') {
        const lbl = (mapData.labels || []).find(l => l.id === id);
        if (lbl) lbl.layerId = targetLayerId;
    } else if (kind === 'spline') {
        const owner = findSplineOwner(id);
        if (owner && owner !== target) {
            const sp = (owner.splines || []).find(s => s.id === id);
            if (sp) {
                owner.splines = owner.splines.filter(s => s.id !== id);
                target.splines = target.splines || [];
                target.splines.push(sp);
            }
        }
    } else if (kind === 'shape') {
        const owner = findShapeOwner(id);
        if (owner && owner !== target) {
            const sh = (owner.shapes || []).find(s => s.id === id);
            if (sh) {
                owner.shapes = owner.shapes.filter(s => s.id !== id);
                target.shapes = target.shapes || [];
                target.shapes.push(sh);
            }
        }
    } else if (kind === 'building') {
        const owner = findBuildingOwner(id);
        if (owner && owner !== target) {
            const bld = (owner.buildings || []).find(b => b.id === id);
            if (bld) {
                owner.buildings = owner.buildings.filter(b => b.id !== id);
                target.buildings = target.buildings || [];
                target.buildings.push(bld);
            }
        }
    }
    render();
    sendMessage({ type: 'mapChanged' });
};

// Draws point + width handles for the active draft or the spline being edited.
function renderSplineEditor() {
    Array.from(handlesOverlay.querySelectorAll('.nv-spline-handle, .nv-spline-width-handle, .nv-spline-rot-handle, .nv-spline-line')).forEach(n => n.remove());
    let points = null, splineId = null, splineKind = 'road', isClosed = false;
    if (splineDraft) { points = splineDraft.points; splineKind = splineDraft.kind; }
    else if (splineEdit) {
        const sp = findSpline(splineEdit.splineId);
        if (sp) { points = sp.points; splineId = sp.id; splineKind = sp.kind; isClosed = !!sp.closed; }
    }
    if (!points) return;

    // Knot-to-knot guide line. Closed splines also draw the wrap segment.
    const guideSegs = (isClosed && points.length > 2) ? points.length : points.length - 1;
    for (let i = 0; i < guideSegs; i++) {
        const a = points[i], b = points[(i + 1) % points.length];
        const x1 = pan.x + a.x * zoom, y1 = pan.y + a.y * zoom;
        const x2 = pan.x + b.x * zoom, y2 = pan.y + b.y * zoom;
        const line = document.createElement('div');
        line.className = 'nv-spline-line';
        const len = Math.hypot(x2 - x1, y2 - y1);
        const ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.width = len + 'px';
        line.style.transform = `rotate(${ang}deg)`;
        handlesOverlay.appendChild(line);
    }
    const selKnot = splineEdit ? (splineEdit.selKnot || 0) : -1;
    points.forEach((p, idx) => {
        const sx = pan.x + p.x * zoom, sy = pan.y + p.y * zoom;
        // Move handle.
        const h = document.createElement('div');
        h.className = 'nv-handle nv-spline-handle' + (idx === selKnot ? ' nv-spline-handle-sel' : '');
        h.style.left = sx + 'px';
        h.style.top = sy + 'px';
        h.dataset.idx = idx;
        h.addEventListener('mousedown', e => {
            // Clicking a knot on a committed spline focuses it for the properties panel.
            if (splineId && splineEdit && splineEdit.selKnot !== idx) {
                splineEdit.selKnot = idx;
                emitSplineSelection();
            }
            startSplinePointDrag(e, points, idx, splineId);
        });
        h.addEventListener('contextmenu', e => {
            e.preventDefault(); e.stopPropagation();
            showKnotContextMenu(e, points, idx, splineId, splineKind);
        });
        handlesOverlay.appendChild(h);
        // Width handle: offset perpendicular by half-width.
        const wh = document.createElement('div');
        wh.className = 'nv-handle nv-spline-width-handle';
        wh.style.left = sx + 'px';
        wh.style.top = (sy - (p.width / 2) * zoom) + 'px';
        wh.dataset.idx = idx;
        wh.title = mapStrings.widthHandleTip;
        wh.addEventListener('mousedown', e => startSplineWidthDrag(e, points, idx, sx, sy, splineId));
        handlesOverlay.appendChild(wh);
        // Rotation handle: only on the focused knot. Sits along the knot's
        // current tangent direction; drag to override the spline's direction
        // through this knot (works for endpoints too).
        if (idx === selKnot) {
            const tans = knotTangents(points, isClosed);
            let dx = tans[idx].x, dy = tans[idx].y;
            if (Math.hypot(dx, dy) < 1e-3) {
                const nb = points[(idx + 1) % points.length] || p;
                dx = nb.x - p.x; dy = nb.y - p.y;
            }
            const dl = Math.hypot(dx, dy) || 1;
            const rh = document.createElement('div');
            rh.className = 'nv-handle nv-spline-rot-handle';
            rh.style.left = (sx + (dx / dl) * 30) + 'px';
            rh.style.top = (sy + (dy / dl) * 30) + 'px';
            rh.title = mapStrings.rotHandleTip;
            rh.addEventListener('mousedown', e => startSplineKnotRotate(e, points, idx, sx, sy, splineId));
            handlesOverlay.appendChild(rh);
        }
    });
}

function startSplineKnotRotate(ev, points, idx, sx, sy, splineId) {
    ev.stopPropagation(); ev.preventDefault();
    function move(e) {
        let a = Math.atan2(e.clientY - sy, e.clientX - sx);
        if (e.shiftKey) a = Math.round(a / (Math.PI / 12)) * (Math.PI / 12); // 15° snap
        points[idx].angle = a;
        renderSplines();
        renderSplineEditor();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        if (splineId) sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

// Right-click a knot: delete it, or set / clear a per-knot type override so the
// spline can blend into a different road/river type along its length.
function showKnotContextMenu(ev, points, idx, splineId, splineKind) {
    closeContextMenu();
    const menu = document.createElement('div');
    menu.className = 'nv-ctx-menu';
    menu.style.left = ev.clientX + 'px';
    menu.style.top = ev.clientY + 'px';
    function commit() {
        if (splineId) { renderSplines(); sendMessage({ type: 'mapChanged' }); }
        else renderSplines();
        renderSplineEditor();
    }
    function item(label, action, disabled) {
        const it = document.createElement('div');
        it.textContent = label;
        if (disabled) it.style.opacity = '0.4';
        it.addEventListener('mousedown', e => e.stopPropagation());
        it.addEventListener('click', () => {
            closeContextMenu();
            if (!disabled) action();
        });
        return it;
    }
    menu.appendChild(item(mapStrings.knotAddBefore, () => {
        addAdjacentKnot(points, idx, false); commit();
    }));
    menu.appendChild(item(mapStrings.knotAddAfter, () => {
        addAdjacentKnot(points, idx, true); commit();
    }));
    menu.appendChild(item(mapStrings.knotDelete, () => {
        if (points.length > 2) { points.splice(idx, 1); commit(); }
    }, points.length <= 2));
    const sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:#555;margin:4px 0;';
    menu.appendChild(sep);
    menu.appendChild(item(mapStrings.knotClearDirection, () => {
        delete points[idx].angle;
        commit();
    }, points[idx].angle == null));
    const sep2 = document.createElement('div');
    sep2.style.cssText = 'height:1px;background:#555;margin:4px 0;';
    menu.appendChild(sep2);
    const presets = SPLINE_PROFILES[splineKind] || SPLINE_PROFILES.road;
    for (const key of Object.keys(presets)) {
        const active = points[idx].typeOverride === key;
        menu.appendChild(item((active ? '● ' : '   ') + mapStrings.knotTypePrefix + key, () => {
            points[idx].typeOverride = key;
            commit();
        }));
    }
    menu.appendChild(item(mapStrings.knotClearOverride, () => {
        delete points[idx].typeOverride;
        commit();
    }, !points[idx].typeOverride));
    openContextMenu(menu);
}

function startSplinePointDrag(ev, points, idx, splineId) {
    ev.stopPropagation(); ev.preventDefault();
    // Junction snapping: when dragging an end knot of a committed open spline,
    // snap onto the nearest knot of any *other* spline (end or interior — so
    // T-junctions work, not just end-to-end). Hold Shift to drag freely.
    const sp = splineId ? findSpline(splineId) : null;
    const canSnap = !!sp && !sp.closed && (idx === 0 || idx === points.length - 1);
    const snapTargets = [];
    if (canSnap) {
        walkNodes(mapData.layers, node => {
            for (const s of node.splines || []) {
                if (s.id === splineId || !s.points) continue;
                for (const pt of s.points) snapTargets.push(pt);
            }
        });
    }
    // Visualise the candidate snap points for the duration of the drag.
    // renderSplineEditor() only clears its own handle classes, so these dots
    // survive the per-frame re-render and are torn down in up().
    const snapDots = [];
    for (const tgt of snapTargets) {
        const dot = document.createElement('div');
        dot.className = 'nv-snap-point';
        dot.style.cssText =
            'position:absolute;width:10px;height:10px;margin:-5px 0 0 -5px;' +
            'border-radius:50%;background:rgba(80,170,255,0.35);' +
            'border:1.5px solid #4aa3ff;pointer-events:none;z-index:9;';
        dot.style.left = (pan.x + tgt.x * zoom) + 'px';
        dot.style.top = (pan.y + tgt.y * zoom) + 'px';
        handlesOverlay.appendChild(dot);
        snapDots.push({ tgt, dot });
    }
    function move(e) {
        let wx = (e.clientX - pan.x) / zoom;
        let wy = (e.clientY - pan.y) / zoom;
        let best = null;
        if (canSnap && !e.shiftKey && snapTargets.length) {
            const thresh = 14 / zoom;       // screen-constant catch radius
            let bestD = thresh;
            for (const tgt of snapTargets) {
                const d = Math.hypot(tgt.x - wx, tgt.y - wy);
                if (d < bestD) { bestD = d; best = tgt; }
            }
            if (best) { wx = best.x; wy = best.y; }
        }
        // Highlight the dot we'd snap to.
        for (const { tgt, dot } of snapDots) {
            const on = tgt === best;
            dot.style.background = on ? '#4aa3ff' : 'rgba(80,170,255,0.35)';
            dot.style.transform = on ? 'scale(1.5)' : 'scale(1)';
        }
        points[idx].x = wx;
        points[idx].y = wy;
        renderSplines();
        renderSplineEditor();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        for (const { dot } of snapDots) dot.remove();
        if (splineId) sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

function startSplineWidthDrag(ev, points, idx, sx, sy, splineId) {
    ev.stopPropagation(); ev.preventDefault();
    function move(e) {
        // Distance from the knot in screen space → world-unit full width.
        const dist = Math.hypot(e.clientX - sx, e.clientY - sy);
        points[idx].width = Math.max(2, (dist * 2) / zoom);
        renderSplines();
        renderSplineEditor();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        if (splineId) sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

// handlers (image / pin / label / knot) still run first and draw their own
// custom menus; this document-level catch-all just guarantees the native menu
// is suppressed on every surface, including ones with no handler.
document.addEventListener('contextmenu', (e) => e.preventDefault());

        || e.target === labelOverlay || e.target === handlesOverlay)
        e.preventDefault();
});
window.addEventListener('mousemove', (e) => {
    lastCursorWorld.x = (e.clientX - pan.x) / zoom;
    lastCursorWorld.y = (e.clientY - pan.y) / zoom;
    updateHud();
    if (!panStart) return;
    pan.x = e.clientX - panStart.x;
    pan.y = e.clientY - panStart.y;
    applyTransform();
});
window.addEventListener('mouseup', () => {
    if (panStart) {
        panStart = null;
        stage.classList.remove('dragging');
        mapData.initialView = { centerX: pan.x, centerY: pan.y, zoom: zoom };

});
stage.addEventListener('wheel', (e) => {
    e.preventDefault();
    // Building placement: when the right mouse button is held OR Shift is
    // held, the wheel rotates the placement preview instead of zooming. 15°
    // step with Shift (snap), otherwise 5°.
    if (toolMode === 'building' && buildingDraft
            && (buildingRotatingRMB || e.shiftKey)) {
        const dir = e.deltaY < 0 ? 1 : -1;
        const step = e.shiftKey ? 15 : 5;
        buildingDraftRotation = (buildingDraftRotation + dir * step) % 360;
        // Re-attach + re-render at the current cursor world position so the
        // preview reflects the new angle immediately.
        const wx = (e.clientX - pan.x) / zoom;
        const wy = (e.clientY - pan.y) / zoom;
        attachBuildingToRoads(buildingDraft, wx, wy, e.shiftKey);
        renderBuildingDraft();
        return;
    }
    const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    const wx = (e.clientX - pan.x) / zoom;
    const wy = (e.clientY - pan.y) / zoom;
    zoom = Math.max(0.05, Math.min(10, zoom * factor));
    pan.x = e.clientX - wx * zoom;
    pan.y = e.clientY - wy * zoom;
    applyTransform();
    mapData.initialView = { centerX: pan.x, centerY: pan.y, zoom: zoom };
    sendMessage({ type: 'viewChanged', centerX: pan.x, centerY: pan.y, zoom: zoom });
}, { passive: false });

// Compute world-space bounding box of all currently-visible images.
function visibleImageBounds() {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    const state = computeNodeState();
    walkNodes(mapData.layers, node => {
        const st = state.get(node.id);
        if (st && !st.visible) return;
        for (const img of node.images || []) {
            const x = img.x || 0, y = img.y || 0;
            const w = img.width || 0, h = img.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        }
    });
    if (minX === Infinity) return null;
    return { minX, minY, maxX, maxY };
}

window.zoomToFit = () => {
    const b = visibleImageBounds();
    const rect = stage.getBoundingClientRect();
    if (!b) { // nothing to fit — reset
        pan.x = rect.width / 2; pan.y = rect.height / 2; zoom = 1;
    } else {
        const bw = Math.max(1, b.maxX - b.minX);
        const bh = Math.max(1, b.maxY - b.minY);
        const margin = 0.92;
        zoom = Math.max(0.05, Math.min(10, Math.min(rect.width / bw, rect.height / bh) * margin));
        const cx = (b.minX + b.maxX) / 2;
        const cy = (b.minY + b.maxY) / 2;
        pan.x = rect.width / 2 - cx * zoom;
        pan.y = rect.height / 2 - cy * zoom;
    }
    lastZoomApplied = -1;
    applyTransform();
    mapData.initialView = { centerX: pan.x, centerY: pan.y, zoom };
    sendMessage({ type: 'viewChanged', centerX: pan.x, centerY: pan.y, zoom });
};

window.resetView = () => {
    const rect = stage.getBoundingClientRect();
    pan.x = rect.width / 2;
    pan.y = rect.height / 2;
    zoom = 1;
    lastZoomApplied = -1;
    applyTransform();
    mapData.initialView = { centerX: pan.x, centerY: pan.y, zoom };
    sendMessage({ type: 'viewChanged', centerX: pan.x, centerY: pan.y, zoom });
};

// Pan / zoom so a pin lands at viewport centre, then flash it. Called by the
// host when navigating from FocusPeek → "linked map pin".
window.focusOnPin = (pinId) => {
    const pin = findPinById(pinId);
    if (!pin) return;
    const rect = stage.getBoundingClientRect();
    const targetZoom = Math.max(1, Math.min(4, zoom < 1.5 ? 1.8 : zoom));
    zoom = targetZoom;
    pan.x = rect.width  / 2 - pin.x * zoom;
    pan.y = rect.height / 2 - pin.y * zoom;
    lastZoomApplied = -1;
    applyTransform();
    sendMessage({ type: 'viewChanged', centerX: pan.x, centerY: pan.y, zoom });
    const host = pinOverlay.querySelector(`.nv-pin-host[data-pin-id="${pinId}"]`);
    if (host) {
        host.classList.remove('nv-pin-flash');
        void host.offsetWidth; // force reflow so animation can restart
        host.classList.add('nv-pin-flash');
    }
};

function firstLeafNode() {
    let leaf = null;
    walkNodes(mapData.layers, n => {
        if (!leaf && (!n.children || n.children.length === 0)) leaf = n;
    });
    return leaf;
}

window.addImageToMap = (relPath, w, h) => {
    log(`addImageToMap relPath="${relPath}" w=${w} h=${h} activeLayer=${activeLayerId}`);
    if (!mapData.layers) mapData.layers = [];
    // Resolve target node: prefer the active layer, else first leaf, else create one.
    let node = activeLayerId ? findLayer(activeLayerId) : null;
    if (!node) node = firstLeafNode();
    if (!node) {
        node = { id: 'layer-1', name: 'Base', opacity: 1, locked: false, hidden: false, expanded: true, images: [], children: [] };
        mapData.layers.push(node);
    }
    if (!node.images) node.images = [];
    log(`addImageToMap target node=${node.id} (hidden=${node.hidden} minZoom=${node.minZoom} maxZoom=${node.maxZoom})`);
    const stageRect = stage.getBoundingClientRect();
    const cx = (stageRect.width / 2 - pan.x) / zoom;
    const cy = (stageRect.height / 2 - pan.y) / zoom;
    const ww = w || 256;
    const hh = h || 256;
    node.images.push({
        id: 'image-' + Date.now(),
        path: relPath,
        x: cx - ww / 2,
        y: cy - hh / 2,
        width: ww,
        height: hh,
        rotation: 0,
    });
    render();
    sendMessage({ type: 'mapChanged' });
};
window.setToolMode = (m) => {
    const want = (m === 'add-pin' || m === 'add-label' || m === 'spline'
        || m === 'terrain' || m === 'border' || m === 'building') ? m : 'select';
    // 'border' with a border already present = edit its vertices, not draw a new one.
    if (want === 'border' && mapData.border) {
        toolMode = 'select';
        stage.style.cursor = 'default';
        if (splineDraft) commitSplineDraft();
        if (terrainDraft) commitTerrainDraft();
        enterBorderEdit();
        log('toolMode = select (border edit)');
        return;
    }
    toolMode = want;
    applyToolModeClass();
    if (toolMode !== 'select') {
        clearSelection();
    }
    if (toolMode !== 'spline' && splineDraft) commitSplineDraft();
    if (toolMode !== 'terrain' && terrainDraft) commitTerrainDraft();
    if (toolMode !== 'border' && borderDraft) commitBorderDraft();
    if (toolMode === 'building') {
        rollBuildingDraft();
    } else if (buildingDraft) {
        buildingDraft = null;
        const dr = world.querySelector('.nv-building[data-building-id="__buildingDraft__"]');
        if (dr) dr.remove();
    }
    closeContextMenu();
    renderBottomBar();
    log('toolMode = ' + toolMode);
};

// HUD: map name, zoom, cursor world coords, active layer, draft summary.
let lastCursorWorld = { x: 0, y: 0 };
function updateHud() {
    if (!hud) return;
    const parts = [];
    parts.push(mapData.name || mapStrings.hudMap || 'Map');
    parts.push(`${mapStrings.hudZoom || 'zoom'} ${zoom.toFixed(2)}`);
    parts.push(`(${lastCursorWorld.x.toFixed(0)}, ${lastCursorWorld.y.toFixed(0)})`);
    const layer = findLayer(activeLayerId);
    if (layer) parts.push(`${mapStrings.hudLayer || 'Layer'}: ${layer.name || layer.id}`);
    if (splineDraft)   parts.push(`${mapStrings.hudSplineDraft  || 'Spline draft'}: ${splineDraft.points.length} ${mapStrings.hudKnots || 'knots'}`);
    if (terrainDraft)  parts.push(`${mapStrings.hudTerrainDraft || 'Terrain draft'}: ${terrainDraft.points.length} ${mapStrings.hudVerts || 'verts'}`);
    if (borderDraft)   parts.push(`${mapStrings.hudBorderDraft  || 'Border draft'}: ${borderDraft.points.length} ${mapStrings.hudVerts || 'verts'}`);
    if (wallDraft)     parts.push(`${mapStrings.hudWallDraft    || 'Wall draft'}: ${wallDraft.points.length} ${mapStrings.hudPts || 'pts'}`);
    hud.textContent = parts.join(' · ');
}

// Reflect current toolMode in body class so CSS can drive cursor + hover affordances.
function applyToolModeClass() {
    const cls = document.body.classList;
    ['tool-select', 'tool-add-pin', 'tool-add-label', 'tool-spline',
     'tool-terrain', 'tool-border', 'tool-building'].forEach(c => cls.remove(c));
    cls.add('tool-' + toolMode);
}

// ── Hover highlight ────────────────────────────────────────────────────
// CSS :hover on multi-path SVGs (splines, terrain, buildings) flickered as
// the cursor crossed internal segments. JS replacement: track the hovered
// element identity, wait 600ms before applying the highlight class, fade via
// CSS transition. Clears immediately when the cursor leaves the element.
const BB_HOVER_DELAY_MS = 50;
let bbHoverTimer = null;
let bbHoverCurrent = null; // 'kind:id'

function bbHoverIdentify(target) {
    if (!target || !target.closest) return null;
    let n;
    if ((n = target.closest('[data-spline-id]')) && n.dataset.splineId !== '__draft__')
        return { kind: 'spline', id: n.dataset.splineId };
    if ((n = target.closest('.nv-terrain[data-shape-id]')) && n.dataset.shapeId !== '__terrainDraft__')
        return { kind: 'shape', id: n.dataset.shapeId };
    if ((n = target.closest('.nv-building[data-building-id]')) && n.dataset.buildingId !== '__buildingDraft__')
        return { kind: 'building', id: n.dataset.buildingId };
    if ((n = target.closest('.nv-pin-host[data-pin-id]')))
        return { kind: 'pin', id: n.dataset.pinId };
    if ((n = target.closest('.nv-label[data-label-id]')))
        return { kind: 'label', id: n.dataset.labelId };
    if ((n = target.closest('.nv-image[data-image-id]')))
        return { kind: 'image', id: n.dataset.imageId };
    return null;
}

function bbApplyHover(kind, id) {
    bbClearHoverClass();
    if (kind === 'spline') {
        document.querySelectorAll(`#spline-svg path[data-spline-id="${id}"]`)
                .forEach(n => n.classList.add('nv-hovered'));
        return;
    }
    let sel = null;
    if (kind === 'shape')    sel = `.nv-terrain[data-shape-id="${id}"]`;
    if (kind === 'building') sel = `.nv-building[data-building-id="${id}"]`;
    if (kind === 'pin')      sel = `.nv-pin-host[data-pin-id="${id}"]`;
    if (kind === 'label')    sel = `.nv-label[data-label-id="${id}"]`;
    if (kind === 'image')    sel = `.nv-image[data-image-id="${id}"]`;
    if (sel) {
        const el = document.querySelector(sel);
        if (el) el.classList.add('nv-hovered');
    }
}
function bbClearHoverClass() {
    document.querySelectorAll('.nv-hovered').forEach(n => n.classList.remove('nv-hovered'));
}
function bbHoverReset() {
    clearTimeout(bbHoverTimer);
    bbHoverTimer = null;
    bbHoverCurrent = null;
    bbClearHoverClass();
}

function bbHoverTrack(e) {
    if (mode !== 'edit' || toolMode !== 'select') {
        if (bbHoverCurrent || bbHoverTimer) bbHoverReset();
        return;
    }
    const found = bbHoverIdentify(e.target);
    const key = found ? `${found.kind}:${found.id}` : null;
    if (key === bbHoverCurrent) return;
    clearTimeout(bbHoverTimer);
    bbClearHoverClass();
    bbHoverCurrent = key;
    if (found) {
        bbHoverTimer = setTimeout(() => bbApplyHover(found.kind, found.id), BB_HOVER_DELAY_MS);
    } else {
        bbHoverTimer = null;
    }
}
window.addEventListener('blur', bbHoverReset);
stage.addEventListener('mouseleave', bbHoverReset);

function _createPin(wx, wy, label, entityType, entityId, color) {
    mapData.pins = mapData.pins || [];
    const id = 'pin-' + Date.now();
    mapData.pins.push({
        id, x: wx, y: wy, style: 'dot',
        label: label || '',
        entityType: entityType || '',
        entityId: entityId || '',
        color: color || null,
        layerId: activeLayerId || '',
    });
    render();
    sendMessage({ type: 'mapChanged' });
    // Auto-select so the bottom-bar editor shows immediately.
    const pin = findPinById(id);
    const host = pinOverlay.querySelector(`.nv-pin-host[data-pin-id="${id}"]`);
    if (pin) selectPin(pin, host);
    return id;
}
window.addPinAtPoint = (wx, wy, label, entityType, entityId, color) =>
    _createPin(wx, wy, label, entityType, entityId, color);
window.addPinAtCenter = (label, entityType, entityId, color) => {
    const stageRect = stage.getBoundingClientRect();
    const cx = (stageRect.width / 2 - pan.x) / zoom;
    const cy = (stageRect.height / 2 - pan.y) / zoom;
    return _createPin(cx, cy, label, entityType, entityId, color);
};
window.updateImageZoomRange = (imageId, minZoom, maxZoom) => {
    const node = findImageNode(imageId);
    if (!node) return;
    const img = node.images.find(i => i.id === imageId);
    if (!img) return;
    img.minZoom = (minZoom && minZoom > 0) ? minZoom : null;
    img.maxZoom = (maxZoom && maxZoom > 0) ? maxZoom : null;
    updateLayerVisibility();
    sendMessage({ type: 'mapChanged' });
};

// Isolate mode: view-only toggle so the user can see exactly which element
// they're editing. Not persisted — getMapData never writes it.
window.setIsolatedElement = (kind, id) => {
    if (id) { isolatedKind = kind || 'image'; isolatedId = id; }
    else { isolatedKind = null; isolatedId = null; }
    updateLayerVisibility();
};
window.setIsolatedImage = (imageId) => window.setIsolatedElement('image', imageId);

// Per-element visible-zoom range for splines / pins / labels (images keep
// their own updateImageZoomRange). 0 on either side = no limit on that side.
window.setElementZoomRange = (kind, id, minZoom, maxZoom) => {
    const obj = elementById(kind, id);
    if (!obj) return;
    obj.minZoom = minZoom > 0 ? minZoom : null;
    obj.maxZoom = maxZoom > 0 ? maxZoom : null;
    updateLayerVisibility();
    sendMessage({ type: 'mapChanged' });
};

window.updatePinColor = (pinId, color) => {
    const pin = findPinById(pinId);
    if (!pin) return;
    pin.color = color || null;
    const host = pinOverlay.querySelector(`.nv-pin-host[data-pin-id="${pinId}"]`);
    if (host) {
        const marker = host.querySelector('.nv-pin-marker');
        if (marker) marker.style.background = color || '';
    }
    sendMessage({ type: 'mapChanged' });
};

window.updatePin = (pinId, label, entityType, entityId, color) => {
    const pin = findPinById(pinId);
    if (!pin) return;
    pin.label = label || '';
    pin.entityType = entityType || '';
    pin.entityId = entityId || '';
    pin.color = color || null;
    render();
    sendMessage({ type: 'mapChanged' });
};
// Single-field pin setters used by the bottom-bar editors.
window.setPinLabel = (pinId, label) => {
    const pin = findPinById(pinId);
    if (!pin) return;
    pin.label = label || '';
    render();
    sendMessage({ type: 'mapChanged' });
};
window.setPinEntity = (pinId, entityId, entityType) => {
    const pin = findPinById(pinId);
    if (!pin) return;
    pin.entityId = entityId || '';
    pin.entityType = entityType || '';
    render();
    sendMessage({ type: 'mapChanged' });
};
window.setPinColor = window.updatePinColor; // alias

// Image clip: drop / replace the polygon directly (skip clip-edit overlay).
window.setImageClip = (imageId, polygon) => {
    let img = null, ownerLayer = null;
    walkNodes(mapData.layers, n => {
        if (img) return;
        const f = (n.images || []).find(i => i.id === imageId);
        if (f) { img = f; ownerLayer = n; }
    });
    if (!img) return;
    if (polygon && polygon.length >= 3) img.clipPolygon = polygon.map(p => ({ x: p.x, y: p.y }));
    else img.clipPolygon = null;
    const el = world.querySelector(`.nv-image[data-image-id="${imageId}"]`);
    if (el) applyClipPath(el, img);
    sendMessage({ type: 'mapChanged' });
};
function findImageById(imageId) {
    let f = null;
    walkNodes(mapData.layers, n => { if (!f) f = (n.images || []).find(i => i.id === imageId); });
    return f || null;
}
function findImageNodeId(imageId) {
    let o = null;
    walkNodes(mapData.layers, n => { if (!o && (n.images || []).some(i => i.id === imageId)) o = n; });
    return o ? o.id : '';
}
window.moveImageToLayer = (sourceLayerId, imageId, targetLayerId) => {
    const src = findLayer(sourceLayerId);
    const dst = findLayer(targetLayerId);
    if (!src || !dst) { log('moveImageToLayer: layer not found'); return; }
    const idx = (src.images || []).findIndex(i => i.id === imageId);
    if (idx < 0) return;
    const [img] = src.images.splice(idx, 1);
    dst.images = dst.images || [];
    dst.images.push(img);
    selected = { kind: 'image', id: imageId, layerId: targetLayerId };
    render();
    sendMessage({ type: 'mapChanged' });
};

// Remove a pin by id from the top-level list or any building floor.
function removePinById(pinId) {
    const before = (mapData.pins || []).length;
    mapData.pins = (mapData.pins || []).filter(p => p.id !== pinId);
    if (mapData.pins.length !== before) return true;
    let removed = false;
    walkNodes(mapData.layers, n => {
        for (const b of n.buildings || [])
            for (const fl of b.floors || [])
                if (fl.pins) {
                    const n0 = fl.pins.length;
                    fl.pins = fl.pins.filter(p => p.id !== pinId);
                    if (fl.pins.length !== n0) removed = true;
                }
    });
    return removed;
}
window.deletePin = (pinId) => {
    removePinById(pinId);
    if (selected?.kind === 'pin' && selected.id === pinId) selected = null;
    render();
    sendMessage({ type: 'mapChanged' });
};
window.deleteSelected = () => {
    if (!selected) return;
    if (selected.kind === 'image') {
        const node = findLayer(selected.layerId) || findImageNode(selected.id);
        if (node) node.images = (node.images || []).filter(i => i.id !== selected.id);
    } else if (selected.kind === 'pin') {
        removePinById(selected.id);
    } else if (selected.kind === 'label') {
        deleteLabel(selected.id);
        return; // deleteLabel handles render + mapChanged
    }
    selected = null;
    render();
    sendMessage({ type: 'mapChanged' });
    renderBottomBar();
};

applyToolModeClass();
renderBottomBar();
sendMessage({ type: 'ready' });
</script>
