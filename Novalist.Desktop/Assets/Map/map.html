let labelEditing = null;   // { id } while a label is being typed into

function applyLabelStyle(el, lbl) {
    el.style.fontFamily = lbl.fontFamily || '';
    el.style.textAlign = lbl.align || 'center';
    el.style.color = lbl.color || '#ffffff';
}

function renderLabel(lbl) {
    const el = document.createElement('div');
    el.className = 'nv-label' + (selected?.kind === 'label' && selected.id === lbl.id ? ' selected' : '');
    el.dataset.labelId = lbl.id;
    el.dataset.worldX = lbl.x;
    el.dataset.worldY = lbl.y;
    el.dataset.fontSize = lbl.fontSize || 18;
    el.dataset.layerId = lbl.layerId || '';
    el.textContent = lbl.text || '';
    el.style.left = (pan.x + lbl.x * zoom) + 'px';
    el.style.top  = (pan.y + lbl.y * zoom) + 'px';
    el.style.fontSize = ((lbl.fontSize || 18) * zoom) + 'px';
    applyLabelStyle(el, lbl);
    el.addEventListener('mousedown', (e) => {
        if (el.isContentEditable) { e.stopPropagation(); return; } // typing — leave caret alone
        if (e.button === 1) { e.preventDefault(); e.stopPropagation(); startPan(e); return; }
        if (trySplinePoint(e)) return;
        if (tryPlacePin(e)) return;
        if (tryPlaceLabel(e)) return;
        if (tryPlaceTerrainPoint(e)) return;
        if (tryPlaceBorderPoint(e)) return;
        if (tryPlaceBuilding(e)) return;
        e.stopPropagation();
        if (mode !== 'edit' || e.button === 2) return;
        if (toolMode !== 'select') return;
        selectLabel(lbl);
        startLabelDrag(e, lbl, el);
    });
    el.addEventListener('dblclick', (e) => {
        if (mode !== 'edit' || toolMode !== 'select') return;
        e.stopPropagation(); e.preventDefault();
        beginLabelEdit(lbl, el);
    });
    el.addEventListener('contextmenu', (e) => {
        e.preventDefault(); e.stopPropagation();
        if (mode !== 'edit' || el.isContentEditable) return;
        showLabelContextMenu(e, lbl);
    });
    labelOverlay.appendChild(el);
    return el;
}

function selectLabel(lbl) {
    if (selected?.kind === 'label' && selected.id === lbl.id) return;
    clearSelection();
    selected = { kind: 'label', id: lbl.id };
    const el = labelOverlay.querySelector(`.nv-label[data-label-id="${lbl.id}"]`);
    if (el) el.classList.add('selected');
    sendMessage({ type: 'labelSelected', labelId: lbl.id,
        fontSize: lbl.fontSize || 18, fontFamily: lbl.fontFamily || '',
        align: lbl.align || 'center', color: lbl.color || '#ffffff' });
    renderBottomBar();
}

function selectPin(pin, host) {
    if (selected?.kind === 'pin' && selected.id === pin.id) return;
    clearSelection();
    selected = { kind: 'pin', id: pin.id };
    if (host) host.classList.add('selected');
    sendMessage({ type: 'pinSelected', pinId: pin.id, color: pin.color || '' });
    renderBottomBar();
}

// Single source of truth for "drop whatever is selected". Every selectX() and
// enterX() calls this first so only one element is ever selected at a time and
// only one bottom-bar mode is ever rendered.
function clearSelection() {
    // floorPlanEdit is a submode of buildingEdit — leave it alone here; it has
    // its own explicit exit gate.
    if (buildingEdit && !floorPlanEdit) exitBuildingEdit();
    if (splineEdit)  exitSplineEdit();
    if (terrainEdit) exitShapeEdit();
    if (borderEdit)  exitBorderEdit();
    if (clipEdit)    exitClipEdit(false);
    if (selected) {
        const wasLabel = selected.kind === 'label';
        const wasPin   = selected.kind === 'pin';
        selected = null;
        if (wasLabel) sendMessage({ type: 'labelDeselected' });
        if (wasPin)   sendMessage({ type: 'pinDeselected' });
    }
    Array.from(world.querySelectorAll('.selected')).forEach(n => n.classList.remove('selected'));
    Array.from(labelOverlay.querySelectorAll('.selected')).forEach(n => n.classList.remove('selected'));
    Array.from(pinOverlay.querySelectorAll('.selected')).forEach(n => n.classList.remove('selected'));
    updateImageHandles();
    renderBottomBar();
}

function bbField(label, child) {

function bbColor(hex, onChange, label) {

function bbNumber(value, min, max, step, onChange, label) {
    const i = document.createElement('input');
    i.type = 'number'; i.min = min; i.max = max; i.step = step; i.value = value;
    i.addEventListener('change', () => { const v = parseFloat(i.value); if (!isNaN(v)) onChange(v); });
    return bbField(label, i);
}
function bbSlider(value, min, max, step, onChange, label) {
    const wrap = document.createElement('span');
    wrap.className = 'bb-field';
    if (label) { const l = document.createElement('span'); l.className = 'bb-flabel'; l.textContent = label; wrap.appendChild(l); }
    const i = document.createElement('input');
    i.type = 'range'; i.min = min; i.max = max; i.step = step; i.value = value;
    const out = document.createElement('span');
    out.className = 'bb-flabel'; out.textContent = (+value).toFixed(step < 1 ? 2 : 0);
    i.addEventListener('input', () => {
        const v = parseFloat(i.value);
        out.textContent = v.toFixed(step < 1 ? 2 : 0);
        onChange(v);
    });
    wrap.appendChild(i); wrap.appendChild(out);
    return wrap;
}
function bbCheckbox(label, checked, onChange) {
    const wrap = document.createElement('label');
    wrap.className = 'bb-field';
    wrap.style.cursor = 'pointer';
    const i = document.createElement('input');
    i.type = 'checkbox'; i.checked = !!checked;
    i.addEventListener('change', () => onChange(i.checked));
    const txt = document.createElement('span');
    txt.className = 'bb-flabel'; txt.textContent = label || '';
    wrap.appendChild(i); wrap.appendChild(txt);
    return wrap;
}
function bbSelect(value, options, onChange, label) {
    // options: array of [value, label] OR plain strings
    const sel = document.createElement('select');
    for (const opt of (options || [])) {
        const o = document.createElement('option');
        if (Array.isArray(opt)) { o.value = opt[0]; o.textContent = opt[1]; }
        else                    { o.value = opt;    o.textContent = opt; }
        if (o.value === (value || '')) o.selected = true;
        sel.appendChild(o);
    }
    sel.addEventListener('change', () => onChange(sel.value));
    return bbField(label, sel);
}
function bbToggleGroup(value, options, onChange) {
    const wrap = document.createElement('span');
    wrap.className = 'bb-toggle';
    for (const [v, lbl] of options) {
        const b = document.createElement('button');
        b.textContent = lbl;
        if (v === value) b.classList.add('active');
        b.addEventListener('click', () => onChange(v));
        wrap.appendChild(b);
    }
    return wrap;
}
function bbText(value, onChange, label, placeholder) {
    const i = document.createElement('input');
    i.type = 'text'; i.value = value || ''; if (placeholder) i.placeholder = placeholder;
    let timer = null;
    i.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => onChange(i.value), 400);
    });
    i.addEventListener('blur', () => { clearTimeout(timer); onChange(i.value); });
    return bbField(label, i);
}
function bbEntityPicker(id, type, onChange, label) {
    // <input list="bb-entities">; shared datalist populated by setEntityOptions.
    let dl = document.getElementById('bb-entities');
    if (!dl) {
        dl = document.createElement('datalist');
        dl.id = 'bb-entities';
        document.body.appendChild(dl);
    }
    const i = document.createElement('input');
    i.type = 'text';
    i.setAttribute('list', 'bb-entities');
    i.placeholder = mapStrings.pinEntityWatermark || '';
    // Show current display name if id resolves; otherwise raw text user typed.
    const cur = (entityOptions || []).find(o => o.id === id);
    i.value = cur ? cur.name : (id || '');
    i.addEventListener('change', () => {
        const picked = (entityOptions || []).find(o => o.name === i.value);
        if (picked) onChange(picked.id, picked.type);
        else onChange('', '');
    });
    return bbField(label, i);
}
function bbPopover(label, populate) {
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.addEventListener('click', e => {
        e.stopPropagation();
        const existing = document.querySelector('.bb-popover');
        if (existing) { existing.remove(); return; }
        const pop = document.createElement('div');
        pop.className = 'bb-popover';
        populate(pop);
        document.body.appendChild(pop);
        const r = btn.getBoundingClientRect();
        const pr = pop.getBoundingClientRect();
        pop.style.left = Math.max(8, Math.min(window.innerWidth - pr.width - 8, r.left)) + 'px';
        pop.style.top = (r.top - pr.height - 6) + 'px';
        const close = ev => {
            if (pop.contains(ev.target) || btn.contains(ev.target)) return;
            pop.remove();
            window.removeEventListener('mousedown', close, true);
            window.removeEventListener('wheel', closeAny);
            window.removeEventListener('blur', closeAny);
        };
        const closeAny = () => {
            pop.remove();
            window.removeEventListener('mousedown', close, true);
            window.removeEventListener('wheel', closeAny);
            window.removeEventListener('blur', closeAny);
        };
        setTimeout(() => {
            window.addEventListener('mousedown', close, true);
            window.addEventListener('wheel', closeAny, { passive: true });
            window.addEventListener('blur', closeAny);
        }, 0);
    });
    return btn;
}

// Entity choices pushed once from the host via setEntityOptions.
let entityOptions = [];   // [{ id, type, name }, ...]
window.setEntityOptions = (json) => {
    try { entityOptions = JSON.parse(json) || []; } catch (e) { entityOptions = []; }
    const dl = document.getElementById('bb-entities');
    if (dl) {
        dl.replaceChildren();
        for (const o of entityOptions) {
            const opt = document.createElement('option');
            opt.value = o.name;
            dl.appendChild(opt);
        }
    }
    renderBottomBar();
};
// Layer options derived live from mapData on every render. No host push needed.

    const out = [];

function startLabelDrag(ev, lbl, el) {
    const start = { x: ev.clientX, y: ev.clientY, px: lbl.x, py: lbl.y };
    function move(e) {
        lbl.x = start.px + (e.clientX - start.x) / zoom;
        lbl.y = start.py + (e.clientY - start.y) / zoom;
        el.dataset.worldX = lbl.x;
        el.dataset.worldY = lbl.y;
        el.style.left = (pan.x + lbl.x * zoom) + 'px';
        el.style.top  = (pan.y + lbl.y * zoom) + 'px';
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

// Inline editing: the label div becomes contentEditable. Enter commits,
// Ctrl/Shift+Enter inserts a line break, Esc cancels. An empty label on
// commit is deleted.
function beginLabelEdit(lbl, el) {
    el = el || labelOverlay.querySelector(`.nv-label[data-label-id="${lbl.id}"]`);
    if (!el || labelEditing) return;
    labelEditing = { id: lbl.id };
    const prevText = lbl.text || '';
    let cancelled = false;
    selectLabel(lbl);
    el.contentEditable = 'plaintext-only';
    el.spellcheck = false;
    el.classList.add('editing');
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    function key(e) {
        e.stopPropagation();
        if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
            e.preventDefault();
            el.blur();
        } else if (e.key === 'Escape') {
            e.preventDefault();
            cancelled = true;
            el.textContent = prevText;
            el.blur();
        }
        // Ctrl/Shift+Enter falls through → browser inserts a newline
    }
    function done() {
        el.removeEventListener('keydown', key);
        el.removeEventListener('blur', done);
        el.contentEditable = 'false';
        el.classList.remove('editing');
        const editId = labelEditing.id;
        labelEditing = null;
        const target = findLabelById(editId);
        if (!target) return;
        if (!cancelled) target.text = (el.innerText || '').replace(/\n$/, '');
        if (!target.text.trim()) { deleteLabel(editId); return; }
        el.textContent = target.text;
        if (!cancelled) sendMessage({ type: 'mapChanged' });
    }
    el.addEventListener('keydown', key);
    el.addEventListener('blur', done);
}

// Remove a label by id from the top-level list or any building floor.
function removeLabelById(labelId) {
    const before = (mapData.labels || []).length;
    mapData.labels = (mapData.labels || []).filter(l => l.id !== labelId);
    if (mapData.labels.length !== before) return true;
    let removed = false;
    walkNodes(mapData.layers, n => {
        for (const b of n.buildings || [])
            for (const fl of b.floors || [])
                if (fl.labels) {
                    const n0 = fl.labels.length;
                    fl.labels = fl.labels.filter(l => l.id !== labelId);
                    if (fl.labels.length !== n0) removed = true;
                }
    });
    return removed;
}

function deleteLabel(labelId) {
    removeLabelById(labelId);
    if (selected?.kind === 'label' && selected.id === labelId) {
        selected = null;
        sendMessage({ type: 'labelDeselected' });
    }
    render();
    sendMessage({ type: 'mapChanged' });
}

// ── Clip-mask editing ───────────────────────────────────────────────────
function enterClipEdit(layerId, imageId) {
    const layer = findLayer(layerId);
    if (!layer) return;
    const img = (layer.images || []).find(i => i.id === imageId);
    if (!img) return;
    const el = world.querySelector(`.nv-image[data-image-id="${imageId}"]`);
    if (!el) return;
    const natW = el.naturalWidth || img.width || 100;
    const natH = el.naturalHeight || img.height || 100;
    let points = (img.clipPolygon || []).map(p => ({ x: p.x, y: p.y }));
    if (points.length < 3) {
        // Seed with full-image rectangle so user starts from a sensible default.
        points = [{ x: 0, y: 0 }, { x: natW, y: 0 }, { x: natW, y: natH }, { x: 0, y: natH }];
    }
    clearSelection();
    if (splineDraft) commitSplineDraft();
    if (terrainDraft) commitTerrainDraft();
    if (borderDraft) commitBorderDraft();
    clipEdit = { layerId, imageId, points };
    selected = { kind: 'image', id: imageId, layerId };
    renderClipEditor();
    renderBottomBar();
}

function exitClipEdit(commit) {
    if (!clipEdit) return;
    const { layerId, imageId, points } = clipEdit;
    clipEdit = null;
    Array.from(handlesOverlay.querySelectorAll('.nv-clip-handle, .nv-clip-line')).forEach(n => n.remove());
    if (commit) {
        const layer = findLayer(layerId);
        const img = (layer?.images || []).find(i => i.id === imageId);
        if (img) {
            img.clipPolygon = points.length >= 3 ? points.map(p => ({ x: p.x, y: p.y })) : null;
            const el = world.querySelector(`.nv-image[data-image-id="${img.id}"]`);
            if (el) applyClipPath(el, img);
            sendMessage({ type: 'mapChanged' });
        }
    } else {
        // Re-render so any preview clip-path reverts to saved state.
        const layer = findLayer(layerId);
        const img = (layer?.images || []).find(i => i.id === imageId);
        if (img) {
            const el = world.querySelector(`.nv-image[data-image-id="${img.id}"]`);
            if (el) applyClipPath(el, img);
        }
    }
    updateImageHandles();
    renderBottomBar();
}

// Map a natural-pixel coord (within the image) to screen coords, accounting for
// the image's world position, size, rotation, and current pan/zoom.
function projectImagePoint(natX, natY, img, el) {
    const natW = el.naturalWidth || img.width || 1;
    const natH = el.naturalHeight || img.height || 1;
    const w = img.width || natW;
    const h = img.height || natH;
    const rot = (img.rotation || 0) * Math.PI / 180;
    const cos = Math.cos(rot), sin = Math.sin(rot);
    const localX = (natX / natW) * w - w / 2;
    const localY = (natY / natH) * h - h / 2;
    const rx = localX * cos - localY * sin;
    const ry = localX * sin + localY * cos;
    const wx = img.x + w / 2 + rx;
    const wy = img.y + h / 2 + ry;
    return [pan.x + wx * zoom, pan.y + wy * zoom];
}

// Inverse of projectImagePoint: screen → natural-pixel within the image.
function unprojectImagePoint(sx, sy, img, el) {
    const natW = el.naturalWidth || img.width || 1;
    const natH = el.naturalHeight || img.height || 1;
    const w = img.width || natW;
    const h = img.height || natH;
    const rot = (img.rotation || 0) * Math.PI / 180;
    const cos = Math.cos(rot), sin = Math.sin(rot);
    const wx = (sx - pan.x) / zoom;
    const wy = (sy - pan.y) / zoom;
    const dx = wx - (img.x + w / 2);
    const dy = wy - (img.y + h / 2);
    const ux = dx * cos + dy * sin;
    const uy = -dx * sin + dy * cos;
    const px = (ux + w / 2) / w * natW;
    const py = (uy + h / 2) / h * natH;
    return [Math.max(0, Math.min(natW, px)), Math.max(0, Math.min(natH, py))];
}

function renderClipEditor() {
    Array.from(handlesOverlay.querySelectorAll('.nv-clip-handle, .nv-clip-line')).forEach(n => n.remove());
    if (!clipEdit) return;
    const layer = findLayer(clipEdit.layerId);
    const img = (layer?.images || []).find(i => i.id === clipEdit.imageId);
    if (!img) return;
    const el = world.querySelector(`.nv-image[data-image-id="${img.id}"]`);
    if (!el) return;

    const pts = clipEdit.points;
    // Live-preview the working polygon on the image.
    applyClipPath(el, { clipPolygon: pts });

    // Polygon edges as rotated dashed lines.
    for (let i = 0; i < pts.length; i++) {
        const next = pts[(i + 1) % pts.length];
        const [x1, y1] = projectImagePoint(pts[i].x, pts[i].y, img, el);
        const [x2, y2] = projectImagePoint(next.x, next.y, img, el);
        const line = document.createElement('div');
        line.className = 'nv-clip-line';
        const len = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        const ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.width = len + 'px';
        line.style.transform = `rotate(${ang}deg)`;
        handlesOverlay.appendChild(line);
    }
    // Point handles, draggable + right-click to delete.
    pts.forEach((p, idx) => {
        const [sx, sy] = projectImagePoint(p.x, p.y, img, el);
        const h = document.createElement('div');
        h.className = 'nv-handle nv-clip-handle';
        h.style.left = sx + 'px';
        h.style.top = sy + 'px';
        h.dataset.idx = idx;
        h.addEventListener('mousedown', e => startClipPointDrag(e, idx, img, el));
        h.addEventListener('contextmenu', e => {
            e.preventDefault();
            e.stopPropagation();
            if (clipEdit.points.length > 3) {
                clipEdit.points.splice(idx, 1);
                renderClipEditor();
            }
        });
        handlesOverlay.appendChild(h);
    });
}

function startClipPointDrag(ev, idx, img, el) {
    ev.stopPropagation();
    ev.preventDefault();
    function move(e) {
        const [px, py] = unprojectImagePoint(e.clientX, e.clientY, img, el);
        clipEdit.points[idx] = { x: px, y: py };
        renderClipEditor();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

// (showClipToolbar / hideClipToolbar removed — bottom bar driven by renderBottomBar)

window.toggleClipEditOnSelected = () => {
    if (clipEdit) { exitClipEdit(false); return; }
    if (!selected || selected.kind !== 'image') { log('toggleClipEdit: no image selected'); return; }
    enterClipEdit(selected.layerId, selected.id);
};

// ── Terrain shapes ──────────────────────────────────────────────────────
let terrainDraft = null;   // { type, layerId, points:[{x,y}] } while drawing
let terrainEdit = null;    // { shapeId, selVert } while editing a committed shape
let terrainDraftType = 'grass';

function terrainColor(type) { return TERRAIN_PRESETS[type] || TERRAIN_PRESETS.grass; }

function findShape(shapeId) {
    let f = null;
    walkNodes(mapData.layers, n => { if (!f) f = (n.shapes || []).find(s => s.id === shapeId); });
    return f || null;
}
function findShapeOwner(shapeId) {
    let o = null;
    walkNodes(mapData.layers, n => { if (!o && (n.shapes || []).some(s => s.id === shapeId)) o = n; });
    return o;
}

function distToSegment(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    let t = len2 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

// SVG path 'd' for a shape's closed polygon, authored in WORLD units.
function shapePathD(points, smooth) {
    if (!points || points.length < 2) return '';
    if (!smooth || points.length < 3)
        return 'M' + points.map(p => p.x.toFixed(2) + ',' + p.y.toFixed(2)).join(' L') + ' Z';
    // Closed Catmull-Rom → cubic Bézier segments.
    const n = points.length;
    let d = 'M' + points[0].x.toFixed(2) + ',' + points[0].y.toFixed(2);
    for (let i = 0; i < n; i++) {
        const p0 = points[(i - 1 + n) % n], p1 = points[i];
        const p2 = points[(i + 1) % n], p3 = points[(i + 2) % n];
        const c1x = p1.x + (p2.x - p0.x) / 6, c1y = p1.y + (p2.y - p0.y) / 6;
        const c2x = p2.x - (p3.x - p1.x) / 6, c2y = p2.y - (p3.y - p1.y) / 6;
        d += ' C' + c1x.toFixed(2) + ',' + c1y.toFixed(2) + ' '
                  + c2x.toFixed(2) + ',' + c2y.toFixed(2) + ' '
                  + p2.x.toFixed(2) + ',' + p2.y.toFixed(2);
    }
    return d + ' Z';
}

// Build (but don't append) the <svg> for one shape. Geometry is world-unit;
// the current zoom is applied as a CSS scale by applyZoomToAllTerrain().
function buildShapeSvg(node, shape) {
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'nv-terrain');
    svg.dataset.layerId = node.id || '';
    svg.dataset.shapeId = shape.id;
    svg.style.transform = `scale(${zoom})`;
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', shapePathD(shape.points, shape.smooth !== false));
    path.setAttribute('fill', shape.color || terrainColor(shape.type));
    const blur = shape.blendStrength || 0;
    if (blur > 0) {
        const fid = 'feather-' + shape.id;
        const defs = document.createElementNS(SVG_NS, 'defs');
        const filter = document.createElementNS(SVG_NS, 'filter');
        filter.setAttribute('id', fid);
        filter.setAttribute('x', '-50%'); filter.setAttribute('y', '-50%');
        filter.setAttribute('width', '200%'); filter.setAttribute('height', '200%');
        const fe = document.createElementNS(SVG_NS, 'feGaussianBlur');
        fe.setAttribute('in', 'SourceGraphic');
        fe.setAttribute('stdDeviation', (blur / 2).toFixed(2));
        filter.appendChild(fe);
        defs.appendChild(filter);
        svg.appendChild(defs);
        path.setAttribute('filter', `url(#${fid})`);
    }
    if (shape.id !== '__terrainDraft__') {
        path.style.cursor = 'pointer';
        path.addEventListener('mousedown', e => {
            if (e.button !== 0) return; // middle/right bubble (pan / context menu)
            if (mode !== 'edit' || toolMode !== 'select') return;
            e.stopPropagation();
            selectShape(shape.id);
        });
        path.addEventListener('dblclick', e => {
            if (mode !== 'edit' || toolMode !== 'select') return;
            e.stopPropagation(); e.preventDefault();
            insertTerrainVertexAt(shape.id, (e.clientX - pan.x) / zoom, (e.clientY - pan.y) / zoom);
        });
        path.addEventListener('contextmenu', e => {
            if (mode !== 'edit') return;
            e.preventDefault(); e.stopPropagation();
            showShapeContextMenu(e, shape);
        });
    }
    svg.appendChild(path);
    return svg;
}

function renderTerrainShape(node, shape) {
    if (!shape.points || shape.points.length < 3) return;
    world.appendChild(buildShapeSvg(node, shape));
}

function rebuildShapeSvgById(shapeId) {
    const owner = findShapeOwner(shapeId), sh = findShape(shapeId);
    if (!owner || !sh) return;
    const old = world.querySelector(`.nv-terrain[data-shape-id="${shapeId}"]`);
    const fresh = buildShapeSvg(owner, sh);
    if (old) old.replaceWith(fresh); else world.appendChild(fresh);
}

window.setTerrainDraftType = (type) => {
    terrainDraftType = TERRAIN_PRESETS[type] ? type : 'grass';
    log('terrainDraftType = ' + terrainDraftType);
};

// Terrain tool: each left-click drops a polygon vertex, consuming the click so
// images / splines / pins underneath are not touched (like the spline tool).
function tryPlaceTerrainPoint(e) {
    if (toolMode !== 'terrain' || mode !== 'edit') return false;
    if (e.button !== 0) return false;
    e.stopPropagation(); e.preventDefault();
    const wx = (e.clientX - pan.x) / zoom;
    const wy = (e.clientY - pan.y) / zoom;
    if (!terrainDraft) terrainDraft = { type: terrainDraftType, layerId: activeLayerId, points: [] };
    terrainDraft.points.push({ x: wx, y: wy });
    renderTerrainDraft();
    renderTerrainEditor();
    return true;
}

function renderTerrainDraft() {
    const old = world.querySelector('.nv-terrain[data-shape-id="__terrainDraft__"]');
    if (old) old.remove();
    if (!terrainDraft || terrainDraft.points.length < 2) return;
    const svg = buildShapeSvg({ id: '__terrainDraft__' }, {
        id: '__terrainDraft__', type: terrainDraft.type,
        color: terrainColor(terrainDraft.type), smooth: true,
        blendStrength: 0, points: terrainDraft.points,
    });
    svg.style.opacity = '0.6';
    world.appendChild(svg);
}

function commitTerrainDraft() {
    if (!terrainDraft) return;
    if (terrainDraft.points.length < 3) {
        terrainDraft = null; render(); renderTerrainEditor(); return;
    }
    const layer = findLayer(activeLayerId) || findLayer(terrainDraft.layerId) || firstLeafNode();
    if (layer) {
        layer.shapes = layer.shapes || [];
        layer.shapes.push({
            id: 'shape-' + Date.now(),
            type: terrainDraft.type,
            color: terrainColor(terrainDraft.type),
            smooth: true,
            blendStrength: 0,
            points: terrainDraft.points.map(p => ({ x: p.x, y: p.y })),
        });
    }
    terrainDraft = null;
    render();
    renderTerrainEditor();
    sendMessage({ type: 'mapChanged' });
    // One shape per tool activation — exit the tool, like the spline tool does.
    toolMode = 'select';
    stage.style.cursor = 'default';
    sendMessage({ type: 'cancelTerrainMode' });
}

function cancelTerrainDraft() {
    terrainDraft = null;
    const old = world.querySelector('.nv-terrain[data-shape-id="__terrainDraft__"]');
    if (old) old.remove();
    renderTerrainEditor();
}

function shapeSelectionPayload(sh) {
    return {
        type: 'shapeSelected', shapeId: sh.id,
        shapeType: sh.type || 'grass',
        color: sh.color || terrainColor(sh.type),
        smooth: sh.smooth !== false,
        blend: sh.blendStrength || 0,
    };
}
function emitShapeSelection() {
    if (!terrainEdit) return;
    const sh = findShape(terrainEdit.shapeId);
    if (sh) sendMessage(shapeSelectionPayload(sh));
}
function selectShape(shapeId) {
    if (terrainEdit && terrainEdit.shapeId === shapeId) return;
    clearSelection();
    terrainEdit = { shapeId, selVert: -1 };
    renderTerrainEditor();
    emitShapeSelection();
    renderBottomBar();
}
function exitShapeEdit() {
    if (!terrainEdit) return;
    terrainEdit = null;
    renderTerrainEditor();
    sendMessage({ type: 'shapeDeselected' });
    renderBottomBar();
}

// (showTerrainToolbar / hideTerrainToolbar removed — bottom bar driven by renderBottomBar)

// Draws vertex handles + edge guide lines for the terrain draft or the shape
// being edited.
function renderTerrainEditor() {
    Array.from(handlesOverlay.querySelectorAll('.nv-terrain-handle, .nv-terrain-line')).forEach(n => n.remove());
    let points = null, shapeId = null;
    if (terrainDraft) { points = terrainDraft.points; }
    else if (terrainEdit) {
        const sh = findShape(terrainEdit.shapeId);
        if (sh) { points = sh.points; shapeId = sh.id; }
    }
    if (!points) return;
    const segs = points.length >= 3 ? points.length : points.length - 1;
    for (let i = 0; i < segs; i++) {
        const a = points[i], b = points[(i + 1) % points.length];
        const x1 = pan.x + a.x * zoom, y1 = pan.y + a.y * zoom;
        const x2 = pan.x + b.x * zoom, y2 = pan.y + b.y * zoom;
        const line = document.createElement('div');
        line.className = 'nv-terrain-line';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.width = Math.hypot(x2 - x1, y2 - y1) + 'px';
        line.style.transform = `rotate(${Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI}deg)`;
        handlesOverlay.appendChild(line);
    }
    const selVert = terrainEdit && terrainEdit.selVert != null ? terrainEdit.selVert : -1;
    points.forEach((p, idx) => {
        const sx = pan.x + p.x * zoom, sy = pan.y + p.y * zoom;
        const h = document.createElement('div');
        h.className = 'nv-handle nv-terrain-handle' + (idx === selVert ? ' nv-terrain-handle-sel' : '');
        h.style.left = sx + 'px';
        h.style.top = sy + 'px';
        h.dataset.idx = idx;
        h.addEventListener('mousedown', e => {
            if (shapeId && terrainEdit) terrainEdit.selVert = idx;
            startTerrainVertexDrag(e, points, idx, shapeId);
        });
        h.addEventListener('contextmenu', e => {
            e.preventDefault(); e.stopPropagation();
            if (points.length > 3) {
                points.splice(idx, 1);
                if (shapeId) { rebuildShapeSvgById(shapeId); sendMessage({ type: 'mapChanged' }); }
                else renderTerrainDraft();
                renderTerrainEditor();
            }
        });
        handlesOverlay.appendChild(h);
    });
}

function startTerrainVertexDrag(ev, points, idx, shapeId) {
    ev.stopPropagation(); ev.preventDefault();
    function move(e) {
        points[idx].x = (e.clientX - pan.x) / zoom;
        points[idx].y = (e.clientY - pan.y) / zoom;
        if (shapeId) rebuildShapeSvgById(shapeId);
        else renderTerrainDraft();
        renderTerrainEditor();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        if (shapeId) sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

// Double-clicking a shape inserts a vertex on the nearest polygon edge.
function insertTerrainVertexAt(shapeId, wx, wy) {
    const sh = findShape(shapeId);
    if (!sh || sh.points.length < 3) return;
    const pts = sh.points, n = pts.length;
    let bestSeg = 0, bestD = Infinity;
    for (let i = 0; i < n; i++) {
        const a = pts[i], b = pts[(i + 1) % n];
        const d = distToSegment(wx, wy, a.x, a.y, b.x, b.y);
        if (d < bestD) { bestD = d; bestSeg = i; }
    }
    pts.splice(bestSeg + 1, 0, { x: wx, y: wy });
    selectShape(shapeId);
    if (terrainEdit) terrainEdit.selVert = bestSeg + 1;
    rebuildShapeSvgById(shapeId);
    renderTerrainEditor();
    emitShapeSelection();
    sendMessage({ type: 'mapChanged' });
}

function showShapeContextMenu(ev, sh) {
    showSimpleContextMenu(ev, [
        [mapStrings.shapeDelete, () => window.deleteShape(sh.id)],
    ]);
}

window.setShapeType = (id, type) => {
    const sh = findShape(id);
    if (!sh) return;
    sh.type = TERRAIN_PRESETS[type] ? type : 'grass';
    sh.color = terrainColor(sh.type); // type re-seeds the colour
    rebuildShapeSvgById(id);
    if (terrainEdit && terrainEdit.shapeId === id) emitShapeSelection();
    sendMessage({ type: 'mapChanged' });
};
window.setShapeColor = (id, hex) => {
    const sh = findShape(id);
    if (!sh) return;
    sh.color = hex || terrainColor(sh.type);
    rebuildShapeSvgById(id);
    sendMessage({ type: 'mapChanged' });
};
window.setShapeSmooth = (id, smooth) => {
    const sh = findShape(id);
    if (!sh) return;
    sh.smooth = !!smooth;
    rebuildShapeSvgById(id);
    sendMessage({ type: 'mapChanged' });
};
window.setShapeBlend = (id, strength) => {
    const sh = findShape(id);
    if (!sh) return;
    sh.blendStrength = Math.max(0, strength);
    rebuildShapeSvgById(id);
    sendMessage({ type: 'mapChanged' });
};
// Reorder a shape within its layer's z-stack. dir > 0 = forward (toward the
// top), dir < 0 = backward. Shapes render in node.shapes array order.
window.moveShapeZ = (id, dir) => {
    const owner = findShapeOwner(id);
    if (!owner || !owner.shapes) return;
    const i = owner.shapes.findIndex(s => s.id === id);
    if (i < 0) return;
    const j = i + (dir > 0 ? 1 : -1);
    if (j < 0 || j >= owner.shapes.length) return;
    const tmp = owner.shapes[i];
    owner.shapes[i] = owner.shapes[j];
    owner.shapes[j] = tmp;
    render();
    sendMessage({ type: 'mapChanged' });
};

window.deleteShape = (id) => {
    const owner = findShapeOwner(id);
    if (!owner) return;
    owner.shapes = (owner.shapes || []).filter(s => s.id !== id);
    if (terrainEdit && terrainEdit.shapeId === id) {
        terrainEdit = null;
        renderTerrainEditor();
        sendMessage({ type: 'shapeDeselected' });
    }
    render();
    sendMessage({ type: 'mapChanged' });
    renderBottomBar();
};

// ── Map border (clip boundary) ──────────────────────────────────────────
let borderDraft = null;   // { points:[{x,y}] } while drawing
let borderEdit = false;   // editing the committed border's vertices

// Hide everything outside the border polygon via clip-path. #world is
// translated by pan only (its local coords are world*zoom); the pin/label
// overlays are screen-space (pan + world*zoom).
function applyBorderClip() {
    const b = mapData.border;
    if (!b || !b.points || b.points.length < 3) {
        world.style.clipPath = '';
        pinOverlay.style.clipPath = '';
        labelOverlay.style.clipPath = '';
        return;
    }
    const wp = b.points.map(p => (p.x * zoom).toFixed(1) + 'px ' + (p.y * zoom).toFixed(1) + 'px').join(',');
    const sp = b.points.map(p => (pan.x + p.x * zoom).toFixed(1) + 'px ' + (pan.y + p.y * zoom).toFixed(1) + 'px').join(',');
    world.style.clipPath = `polygon(${wp})`;
    pinOverlay.style.clipPath = `polygon(${sp})`;
    labelOverlay.style.clipPath = `polygon(${sp})`;
}

function renderBorderOutline() {
    borderOutline.innerHTML = '';
    const b = mapData.border;
    const pts = borderDraft ? borderDraft.points : (b && b.points);
    if (!pts || pts.length < 2) return;
    const poly = document.createElementNS(SVG_NS, 'polygon');
    poly.setAttribute('points', pts.map(p =>
        (pan.x + p.x * zoom).toFixed(1) + ',' + (pan.y + p.y * zoom).toFixed(1)).join(' '));
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', (b && b.outlineColor) || '#1c1a18');
    poly.setAttribute('stroke-width', (((b && b.outlineWidth) || 4) * zoom).toFixed(2));
    poly.setAttribute('stroke-linejoin', 'round');
    if (borderDraft) poly.setAttribute('stroke-dasharray', '8 6');
    // Clickable (for double-click insert) only while editing the committed border.
    poly.style.pointerEvents = borderEdit ? 'stroke' : 'none';
    if (borderEdit) {
        poly.addEventListener('dblclick', e => {
            if (mode !== 'edit') return;
            e.stopPropagation();
            insertBorderVertexAt((e.clientX - pan.x) / zoom, (e.clientY - pan.y) / zoom);
        });
    }
    borderOutline.appendChild(poly);
}

function refreshBorder() {
    applyBorderClip();
    renderBorderOutline();
}

function tryPlaceBorderPoint(e) {
    if (toolMode !== 'border' || mode !== 'edit') return false;
    if (e.button !== 0) return false;
    e.stopPropagation(); e.preventDefault();
    if (!borderDraft) borderDraft = { points: [] };
    borderDraft.points.push({ x: (e.clientX - pan.x) / zoom, y: (e.clientY - pan.y) / zoom });
    renderBorderOutline();
    renderBorderEditor();
    return true;
}

function commitBorderDraft() {
    if (!borderDraft) return;
    if (borderDraft.points.length < 3) {
        borderDraft = null; refreshBorder(); renderBorderEditor(); return;
    }
    const prev = mapData.border;
    mapData.border = {
        points: borderDraft.points.map(p => ({ x: p.x, y: p.y })),
        outlineColor: (prev && prev.outlineColor) || '#1c1a18',
        outlineWidth: (prev && prev.outlineWidth) || 4,
    };
    borderDraft = null;
    refreshBorder();
    renderBorderEditor();
    sendMessage({ type: 'mapChanged' });
    toolMode = 'select';
    applyToolModeClass();
    sendMessage({ type: 'cancelBorderMode' });
    renderBottomBar();
}

function cancelBorderDraft() {
    borderDraft = null;
    refreshBorder();
    renderBorderEditor();
}

function borderSelectionPayload() {
    const b = mapData.border;
    return {
        type: 'borderSelected',
        outlineColor: (b && b.outlineColor) || '#1c1a18',
        outlineWidth: (b && b.outlineWidth) || 4,
    };
}
function enterBorderEdit() {

function renderBorderEditor() {
    Array.from(handlesOverlay.querySelectorAll('.nv-border-handle, .nv-border-line')).forEach(n => n.remove());
    let points = null, committed = false;
    if (borderDraft) points = borderDraft.points;
    else if (borderEdit && mapData.border) { points = mapData.border.points; committed = true; }
    if (!points) return;
    const segs = points.length >= 3 ? points.length : points.length - 1;
    for (let i = 0; i < segs; i++) {
        const a = points[i], b = points[(i + 1) % points.length];
        const x1 = pan.x + a.x * zoom, y1 = pan.y + a.y * zoom;
        const x2 = pan.x + b.x * zoom, y2 = pan.y + b.y * zoom;
        const line = document.createElement('div');
        line.className = 'nv-border-line';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.width = Math.hypot(x2 - x1, y2 - y1) + 'px';
        line.style.transform = `rotate(${Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI}deg)`;
        handlesOverlay.appendChild(line);
    }
    points.forEach((p, idx) => {
        const sx = pan.x + p.x * zoom, sy = pan.y + p.y * zoom;
        const h = document.createElement('div');
        h.className = 'nv-handle nv-border-handle';
        h.style.left = sx + 'px';
        h.style.top = sy + 'px';
        h.addEventListener('mousedown', e => startBorderVertexDrag(e, points, idx, committed));
        h.addEventListener('contextmenu', e => {
            e.preventDefault(); e.stopPropagation();
            if (points.length > 3) {
                points.splice(idx, 1);
                refreshBorder();
                renderBorderEditor();
                if (committed) sendMessage({ type: 'mapChanged' });
            }
        });
        handlesOverlay.appendChild(h);
    });
}

function startBorderVertexDrag(ev, points, idx, committed) {
    ev.stopPropagation(); ev.preventDefault();
    function move(e) {
        points[idx].x = (e.clientX - pan.x) / zoom;
        points[idx].y = (e.clientY - pan.y) / zoom;
        refreshBorder();
        renderBorderEditor();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        if (committed) sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

// Double-clicking the border outline inserts a vertex on the nearest edge.
function insertBorderVertexAt(wx, wy) {
    const b = mapData.border;
    if (!b || b.points.length < 3) return;
    const pts = b.points, n = pts.length;
    let bestSeg = 0, bestD = Infinity;
    for (let i = 0; i < n; i++) {
        const a = pts[i], c = pts[(i + 1) % n];
        const d = distToSegment(wx, wy, a.x, a.y, c.x, c.y);
        if (d < bestD) { bestD = d; bestSeg = i; }
    }
    pts.splice(bestSeg + 1, 0, { x: wx, y: wy });
    refreshBorder();
    renderBorderEditor();
    sendMessage({ type: 'mapChanged' });
}

// ── Buildings ───────────────────────────────────────────────────────────
const BUILDING_TYPES = {
    rowHome:      { roofColor: '#b06a4a', outline: '#5e3826' },
    singleFamily: { roofColor: '#c08552', outline: '#6e4626' },
    school:       { roofColor: '#9a8f73', outline: '#534b39' },
    police:       { roofColor: '#6f7d92', outline: '#3b4452' },
    fireStation:  { roofColor: '#a8443a', outline: '#5e231e' },
    hall:         { roofColor: '#8a7fa0', outline: '#473f57' },
    playground:   { roofColor: '#d6c060', outline: '#7a6c2e' },
    trainStation: { roofColor: '#7a6d5a', outline: '#3f382d' },
};
function buildingTypeDef(type) { return BUILDING_TYPES[type] || BUILDING_TYPES.singleFamily; }

// Tiny seeded RNG (mulberry32) — drives the per-type footprint generators.
function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}
function rectPoly(w, h) {
    return [{ x: -w / 2, y: -h / 2 }, { x: w / 2, y: -h / 2 },
            { x: w / 2, y: h / 2 }, { x: -w / 2, y: h / 2 }];
}

// Per-type random footprint generator → polygon centred on the origin.
function generateFootprint(type, rng) {
    const jit = (base, amt) => base + (rng() - 0.5) * 2 * amt;
    if (type === 'rowHome') return rectPoly(jit(11, 2), jit(22, 4));
    if (type === 'singleFamily') {
        const w = jit(18, 3), h = jit(15, 3);
        const TL = { x: -w / 2, y: -h / 2 }, TR = { x: w / 2, y: -h / 2 };
        const BR = { x: w / 2, y: h / 2 }, BL = { x: -w / 2, y: h / 2 };
        if (rng() > 0.4) { // garage / wing bump
            const gw = jit(7, 1.5), gh = jit(8, 2);
            if (rng() > 0.5) // bump on the right, between TR and BR
                return [TL, TR, { x: w / 2, y: h / 2 - gh },
                        { x: w / 2 + gw, y: h / 2 - gh }, { x: w / 2 + gw, y: h / 2 }, BR, BL];
            // bump on the left, between BL and TL
            return [TL, TR, BR, BL, { x: -w / 2 - gw, y: h / 2 },
                    { x: -w / 2 - gw, y: h / 2 - gh }, { x: -w / 2, y: h / 2 - gh }];
        }
        return [TL, TR, BR, BL];
    }
    if (type === 'school') {
        const w = jit(42, 6), h = jit(24, 4), ww = jit(14, 3), wh = jit(16, 3);
        const poly = rectPoly(w, h);
        poly.splice(2, 0, { x: w / 2, y: h / 2 - wh },
            { x: w / 2 + ww, y: h / 2 - wh }, { x: w / 2 + ww, y: h / 2 });
        return poly;
    }
    if (type === 'police') return rectPoly(jit(22, 3), jit(18, 3));
    if (type === 'fireStation') {
        const w = jit(26, 3), h = jit(18, 2);
        const poly = rectPoly(w, h);
        poly.splice(2, 0, { x: w / 2, y: h / 2 - 4 },
            { x: w / 2 + 6, y: h / 2 - 4 }, { x: w / 2 + 6, y: h / 2 });
        return poly;
    }
    if (type === 'hall') return rectPoly(jit(34, 5), jit(22, 4));
    if (type === 'playground') {
        const n = 8, rad = jit(16, 3), out = [];
        for (let i = 0; i < n; i++) {
            const ang = (i / n) * Math.PI * 2, r = rad * jit(1, 0.25);
            out.push({ x: Math.cos(ang) * r, y: Math.sin(ang) * r });
        }
        return out;
    }
    if (type === 'trainStation') return rectPoly(jit(46, 6), jit(14, 2));
    return rectPoly(jit(18, 3), jit(15, 3));
}

let buildingDraft = null;       // { type, footprint, rotation, x, y } — placement preview
let buildingEdit = null;        // { buildingId } — selected building
let buildingDraftType = 'singleFamily';
let buildingScale = 1;          // global placement-size multiplier (host toolbar)

// by mouse-wheel while the right mouse button is held during building
// placement (see stage wheel handler). Added on top of the road snap angle

let buildingDraftRotation = 0;
let buildingRotatingRMB = false; // true while RMB is held during placement
let floorPlanEdit = null;       // { buildingId } — editing a building's floor plan
let floorPlanTool = 'select';   // 'select' | 'wall'
let wallDraft = null;           // { points:[{x,y}] } — wall chain being drawn
let stairDraft = null;          // { start:{x,y}, cursor:{x,y} } — stairs being drawn

function findBuilding(id) {

    return f || null;
}
function findBuildingOwner(id) {
    let o = null;
    walkNodes(mapData.layers, n => { if (!o && (n.buildings || []).some(b => b.id === id)) o = n; });
    return o;

// Labels / pins can be top-level OR scoped to a building floor. These resolve

function findLabelById(id) {

            for (const fl of b.floors || [])

// Re-render every plan-showing building's active-floor labels + pins into the

function renderFloorAnnotations() {
    // Keep a label that is mid-edit on screen — removing it would blur the

    labelOverlay.querySelectorAll('.nv-label[data-floor-bld]').forEach(n => {

    pinOverlay.querySelectorAll('.nv-pin-host[data-floor-bld]').forEach(n => n.remove());
    const state = computeNodeState();
    walkNodes(mapData.layers, node => {
        const st = state.get(node.id);

window.setBuildingDraftType = (type) => {
    buildingDraftType = BUILDING_TYPES[type] ? type : 'singleFamily';
    if (toolMode === 'building') rollBuildingDraft();
};

// Roll a fresh random footprint for the placement preview, keeping the cursor
// position. Bound to the re-roll hotkey + the type picker. Resets the manual
// rotation so each new draft starts road-aligned (or 0°).
function rollBuildingDraft() {
    const rng = mulberry32((Math.random() * 0xffffffff) >>> 0);
    const prev = buildingDraft || {};
    let fp = generateFootprint(buildingDraftType, rng);
    if (buildingScale !== 1)
        fp = fp.map(p => ({ x: p.x * buildingScale, y: p.y * buildingScale }));
    buildingDraft = {
        type: buildingDraftType,
        footprint: fp,
        rotation: 0,
        x: prev.x || 0, y: prev.y || 0,
    };
    buildingDraftRotation = 0;
    renderBuildingDraft();
}

// Footprint in absolute world coords (rotation + translation applied).
function buildingWorldPoints(b) {
    const rad = (b.rotation || 0) * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    const ox = b.x || 0, oy = b.y || 0;
    return (b.footprint || []).map(p => ({
        x: ox + p.x * cos - p.y * sin,
        y: oy + p.x * sin + p.y * cos,
    }));
}

// Snap the placement preview parallel + offset to the nearest road (any layer).
// Shift on the move event suppresses it (free placement), like knot snapping.
function attachBuildingToRoads(b, wx, wy, shift) {
    b.rotation = 0;
    if (shift) {
        b.x = wx; b.y = wy;
        b.rotation = buildingDraftRotation; // free placement → user angle
        return;
    }
    let best = null, bestD = 90 / zoom;
    walkNodes(mapData.layers, node => {
        for (const sp of node.splines || []) {
            if (sp.kind !== 'road' || !sp.points || sp.points.length < 2) continue;
            const prof = splineProfile(sp.kind, sp.preset);
            const samples = sampleSpline(sp.points, prof.straight, sp.closed);
            for (let i = 0; i < samples.length - 1; i++) {
                const a = samples[i], c = samples[i + 1];
                const d = distToSegment(wx, wy, a.x, a.y, c.x, c.y);
                if (d < bestD) { bestD = d; best = { a, c }; }
            }
        }
    });
    if (!best) {
        // No road in range → free placement with user-controlled rotation.
        b.x = wx; b.y = wy;
        b.rotation = buildingDraftRotation;
        return;
    }
    const dx = best.c.x - best.a.x, dy = best.c.y - best.a.y;
    const len2 = dx * dx + dy * dy || 1;
    let t = ((wx - best.a.x) * dx + (wy - best.a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const nx = best.a.x + t * dx, ny = best.a.y + t * dy;
    const tl = Math.hypot(dx, dy) || 1, tnx = dx / tl, tny = dy / tl;
    let normX = -tny, normY = tnx;
    if ((wx - nx) * normX + (wy - ny) * normY < 0) { normX = -normX; normY = -normY; }
    const halfW = ((best.a.w || 24) + (best.c.w || 24)) / 4;
    // Front faces the road, plus the user's wheel-driven offset.
    b.rotation = Math.atan2(tny, tnx) * 180 / Math.PI + 90 + buildingDraftRotation;
    // Project the rotated footprint onto the road normal: the most-negative
    // projection is the vertex reaching furthest toward the road. Offset the
    // building so that vertex sits `margin` past the road edge → no overlap.
    const rad = b.rotation * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad);
    let minProj = 1e9;
    for (const p of b.footprint) {
        const rx = p.x * cos - p.y * sin, ry = p.x * sin + p.y * cos;
        const proj = rx * normX + ry * normY;
        if (proj < minProj) minProj = proj;
    }
    const margin = 2;
    const dist = halfW + margin - minProj;
    b.x = nx + normX * dist;
    b.y = ny + normY * dist;
}

function polyCentroid(pts) {
    let cx = 0, cy = 0;
    for (const p of pts) { cx += p.x; cy += p.y; }
    return { x: cx / pts.length, y: cy / pts.length };
}
// Ridge axis = direction of the longest footprint edge.
function footprintRidgeDir(pts) {
    let bx = 1, by = 0, bl = -1;
    for (let i = 0; i < pts.length; i++) {
        const a = pts[i], b = pts[(i + 1) % pts.length];
        const dx = b.x - a.x, dy = b.y - a.y, l = dx * dx + dy * dy;
        if (l > bl) { bl = l; bx = dx; by = dy; }
    }
    const l = Math.hypot(bx, by) || 1;
    return { x: bx / l, y: by / l };
}
// Lighten (f > 0) or darken (f < 0) a #rrggbb colour by fraction |f|.
function shadeRoof(hex, f) {
    return f >= 0 ? lerpColor(hex, '#ffffff', f) : lerpColor(hex, '#000000', -f);
}

// Clip a polygon to one half-plane of the line through p0 along dir. keepPos =
// keep the +normal side. Sutherland-Hodgman against a single edge.
function clipPolyHalf(poly, p0, dir, keepPos) {
    const nx = -dir.y, ny = dir.x;
    const sgn = keepPos ? 1 : -1;
    const side = q => ((q.x - p0.x) * nx + (q.y - p0.y) * ny) * sgn;
    const out = [];
    const n = poly.length;
    for (let i = 0; i < n; i++) {
        const a = poly[i], b = poly[(i + 1) % n];
        const sa = side(a), sb = side(b);
        if (sa >= 0) out.push(a);
        if ((sa >= 0) !== (sb >= 0)) {
            const t = sa / (sa - sb);
            out.push({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t });
        }
    }
    return out;
}

// Roof geometry for the roof view: two shaded eave planes (the footprint split
// along the ridge centre-line, so they always clip exactly to the footprint —
// no spill on rotated / irregular shapes), plus the ridge line and, for hips,
// hip lines fanning to the corners. flat = nothing.
// Returns { faces: [{pts, shade}], lines: [{x1,y1,x2,y2}] }.
function buildRoof(b, footprint) {
    const kind = (b.roof && b.roof.kind) || 'gable';
    if (kind === 'flat' || footprint.length < 3) return { faces: [], lines: [] };
    const c = polyCentroid(footprint);
    const d = footprintRidgeDir(footprint);
    const nx = -d.y, ny = d.x;
    let aLo = 1e9, aHi = -1e9, pSpan = 0;
    for (const q of footprint) {
        const px = q.x - c.x, py = q.y - c.y;
        const a = px * d.x + py * d.y;
        aLo = Math.min(aLo, a); aHi = Math.max(aHi, a);
    }
    let pLo = 1e9, pHi = -1e9;
    for (const q of footprint) {
        const p = (q.x - c.x) * nx + (q.y - c.y) * ny;
        pLo = Math.min(pLo, p); pHi = Math.max(pHi, p);
    }
    pSpan = pHi - pLo;
    const aSpan = aHi - aLo;
    // Ridge runs the full along-axis for a gable; a hip pulls the ends in.
    const e = kind === 'hip' ? Math.min(pSpan * 0.5, aSpan * 0.42) : 0;
    const W = (a, p) => ({ x: c.x + d.x * a + nx * p, y: c.y + d.y * a + ny * p });
    const rS = W(aLo + e, 0), rE = W(aHi - e, 0);
    // Two eave planes = footprint clipped by the ridge centre-line.
    const planePos = clipPolyHalf(footprint, c, d, true);
    const planeNeg = clipPolyHalf(footprint, c, d, false);
    const lx = -0.55, ly = -0.84; // fixed light, upper-left, world space
    // Pitch drives the slope-shading contrast (top-down can't show true 3D
    // steepness): shallow roof = nearly flat-looking, steep roof = strong faces.
    const pitch = (b.roof && b.roof.pitch != null) ? b.roof.pitch : 0.5;
    const contrast = 0.06 + 0.30 * Math.max(0, Math.min(1, pitch));
    const shadeOf = (sx, sy) => {
        const sl = Math.hypot(sx, sy) || 1;
        return contrast * ((sx / sl) * lx + (sy / sl) * ly);
    };
    const faces = [];
    if (planePos.length >= 3) faces.push({ pts: planePos, shade: shadeOf(nx, ny) });
    if (planeNeg.length >= 3) faces.push({ pts: planeNeg, shade: shadeOf(-nx, -ny) });
    const lines = [{ x1: rS.x, y1: rS.y, x2: rE.x, y2: rE.y }];
    if (kind === 'hip') {
        for (const en of [rS, rE]) {
            const near = footprint.slice().sort((p, q) =>
                Math.hypot(p.x - en.x, p.y - en.y) - Math.hypot(q.x - en.x, q.y - en.y));
            for (const v of near.slice(0, 2))
                lines.push({ x1: en.x, y1: en.y, x2: v.x, y2: v.y });
        }
    }
    return { faces, lines };
}

// Naive inward polygon inset (miter offset) — used for upper-floor outlines.
function insetPolygon(pts, dist) {
    const n = pts.length;
    if (dist <= 0 || n < 3) return pts.map(p => ({ x: p.x, y: p.y }));
    let area = 0;
    for (let i = 0; i < n; i++) { const a = pts[i], b = pts[(i + 1) % n]; area += a.x * b.y - b.x * a.y; }
    const sign = area > 0 ? 1 : -1;
    const out = [];
    for (let i = 0; i < n; i++) {
        const prev = pts[(i - 1 + n) % n], cur = pts[i], next = pts[(i + 1) % n];
        let e1x = cur.x - prev.x, e1y = cur.y - prev.y, e2x = next.x - cur.x, e2y = next.y - cur.y;
        const l1 = Math.hypot(e1x, e1y) || 1, l2 = Math.hypot(e2x, e2y) || 1;
        e1x /= l1; e1y /= l1; e2x /= l2; e2y /= l2;
        const n1x = e1y * sign, n1y = -e1x * sign, n2x = e2y * sign, n2y = -e2x * sign;

        if (Math.abs(dot) < 0.25) dot = dot < 0 ? -0.25 : 0.25; // clamp sharp miters
        const s = dist / dot;

// { kind, amt } where amt is a fraction in [0, 0.8].
function roofShrink(roof, floorIdx) {

    const amt = Math.min(0.8, (roof.pitch || 0) * floorIdx * 0.22);
    if (amt <= 0) return null;

    const c = polyCentroid(fp);
    if (sh.kind === 'hip') {
        // Hip: all sides slope inward → uniform inset.
        let r = 0;
        for (const p of fp) r += Math.hypot(p.x - c.x, p.y - c.y);
        r /= fp.length;
        return insetPolygon(fp, r * sh.amt);
    }

    // axis; the gable ends (along the ridge) keep their extent.

            floors: [],
        });
    }
    render();
    sendMessage({ type: 'mapChanged' });
    rollBuildingDraft(); // ready the next placement
    return true;
}

// Rotation handle for the selected building. Sits above its topmost footprint
// point. Hidden while floor-plan editing that building.
function renderBuildingEditor() {
    Array.from(handlesOverlay.querySelectorAll('.nv-bld-rot-handle')).forEach(n => n.remove());
    if (!buildingEdit) return;
    if (floorPlanEdit && floorPlanEdit.buildingId === buildingEdit.buildingId) return;
    const b = findBuilding(buildingEdit.buildingId);
    if (!b || !b.footprint || b.footprint.length < 3) return;
    let topY = 1e9, topX = 0;
    for (const p of b.footprint) if (p.y < topY) { topY = p.y; topX = p.x; }
    const h = document.createElement('div');
    h.className = 'nv-handle nv-bld-rot-handle';
    h.style.left = (pan.x + topX * zoom) + 'px';
    h.style.top = (pan.y + topY * zoom - 26) + 'px';
    h.title = mapStrings.bldRotateTip || '';
    h.addEventListener('mousedown', e => startBuildingRotate(e, b));
    handlesOverlay.appendChild(h);
}

function startBuildingRotate(ev, b) {
    ev.stopPropagation(); ev.preventDefault();
    const c = polyCentroid(b.footprint);
    const cx = pan.x + c.x * zoom, cy = pan.y + c.y * zoom;
    let last = Math.atan2(ev.clientY - cy, ev.clientX - cx);
    function move(e) {
        let a = Math.atan2(e.clientY - cy, e.clientX - cx);
        let delta = a - last;
        if (e.shiftKey) {
            delta = Math.round(delta / (Math.PI / 12)) * (Math.PI / 12); // 15° steps
            if (delta === 0) return;
        }
        last += delta;
        rotateBuildingGeometry(b, c, delta);
        rebuildBuildingSvg(b.id);
        renderFloorSelectors();
        renderFloorAnnotations();
        renderBuildingEditor();
    }
    function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        sendMessage({ type: 'mapChanged' });
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
}

// Rotate footprint + every floor's contents (walls, stairs, labels, pins) around
// the footprint centroid. Openings store a parametric t along walls / outline
// edges, so they follow automatically.
function rotateBuildingGeometry(b, c, delta) {
    const cos = Math.cos(delta), sin = Math.sin(delta);
    const rot = (x, y) => {
        const dx = x - c.x, dy = y - c.y;
        return { x: c.x + dx * cos - dy * sin, y: c.y + dx * sin + dy * cos };
    };
    (b.footprint || []).forEach(p => { const r = rot(p.x, p.y); p.x = r.x; p.y = r.y; });
    const degDelta = delta * 180 / Math.PI;
    (b.floors || []).forEach(fl => {
        (fl.walls || []).forEach(w => {
            const a = rot(w.x1, w.y1), d = rot(w.x2, w.y2);
            w.x1 = a.x; w.y1 = a.y; w.x2 = d.x; w.y2 = d.y;
        });
        (fl.stairs || []).forEach(s => {
            const r = rot(s.x, s.y); s.x = r.x; s.y = r.y;
            s.rotation = (s.rotation || 0) + degDelta;
        });
        (fl.labels || []).forEach(l => { const r = rot(l.x, l.y); l.x = r.x; l.y = r.y; });
        (fl.pins || []).forEach(p => { const r = rot(p.x, p.y); p.x = r.x; p.y = r.y; });
    });
}

window.setBuildingActiveFloor = setBuildingActiveFloor;

// Inline per-building floor selectors (screen-space, on top of the stage).
// Shown for every building whose floor plan is currently visible.
function renderFloorSelectors() {
    Array.from(stage.querySelectorAll('.nv-floor-selector')).forEach(n => n.remove());
    // Reserve bottom-bar height so the selector never falls behind the permanent bar.
    const bbHeight = (bb && bb.el) ? bb.el.offsetHeight : 0;
    const viewBottom = window.innerHeight - bbHeight - 8;
    walkNodes(mapData.layers, node => {
        for (const b of node.buildings || []) {
            if ((b.floorCount || 0) < 1 || !buildingShowsPlan(b)) continue;
            const el = world.querySelector(`.nv-building[data-building-id="${b.id}"]`);
            if (el && el.style.display === 'none') continue;
            let top = (b.footprint || [])[0];
            if (!top) continue;
            for (const p of b.footprint) if (p.y < top.y) top = p;
            const sel = document.createElement('div');
            sel.className = 'nv-floor-selector';
            const sx = pan.x + top.x * zoom;
            let sy = pan.y + top.y * zoom - 16;
            if (sy > viewBottom) sy = viewBottom;
            sel.style.left = sx + 'px';
            sel.style.top = sy + 'px';
            const up = document.createElement('button'); up.textContent = '▲';
            const lbl = document.createElement('div'); lbl.className = 'lbl';
            lbl.textContent = ((b.activeFloor || 0) + 1) + '/' + b.floorCount;
            const down = document.createElement('button'); down.textContent = '▼';
            up.addEventListener('click', e => { e.stopPropagation(); setBuildingActiveFloor(b.id, (b.activeFloor || 0) + 1); });
            down.addEventListener('click', e => { e.stopPropagation(); setBuildingActiveFloor(b.id, (b.activeFloor || 0) - 1); });
            sel.addEventListener('mousedown', e => e.stopPropagation());
            sel.appendChild(up); sel.appendChild(lbl); sel.appendChild(down);
            stage.appendChild(sel);
        }
    });
}

// Rebuild buildings whose roof ↔ plan state changed at the new zoom.
function refreshBuildingsForZoom() {
    walkNodes(mapData.layers, node => {
        for (const b of node.buildings || []) {
            const el = world.querySelector(`.nv-building[data-building-id="${b.id}"]`);
            if (!el) continue;
            const want = (buildingShowsPlan(b)) ? '1' : '0';

}

function enterFloorPlanEdit(id) {
    const b = findBuilding(id);
    if (!b) return;
    if ((b.floorCount || 0) < 1) {
        sendMessage({ type: 'toast', level: 'warn',
                      text: mapStrings.fpNoFloorsWarn || 'Building has no floors. Add a floor first.' });
        return;
    }
    // Idempotent: same building = no-op; different building = exit cleanly first.
    if (floorPlanEdit) {
        if (floorPlanEdit.buildingId === id) return;
        exitFloorPlanEdit();
    }
    // Commit any draft geometry so it doesn't vanish behind the isolation.
    if (splineDraft) commitSplineDraft();
    if (terrainDraft) commitTerrainDraft();
    if (borderDraft) commitBorderDraft();
    floorPlanEdit = { buildingId: id };
    floorPlanTool = 'select';
    wallDraft = null;
    // Isolate the building being edited — hide every other layer / element so
    // nothing gets in the way. Stash the previous isolate state to restore.
    floorPlanPrevIso = { kind: isolatedKind, id: isolatedId };
    isolatedKind = 'building';
    isolatedId = id;
    rebuildBuildingSvg(id);
    updateLayerVisibility();
    renderFloorSelectors();
    renderBuildingEditor(); // hide the rotation handle while floor-plan editing
    sendMessage({ type: 'floorPlanEditEntered', buildingId: id });
    renderBottomBar();
}
function exitFloorPlanEdit() {
    if (!floorPlanEdit) return;
    commitWallDraft();
    const prev = floorPlanEdit;
    floorPlanEdit = null;
    floorPlanTool = 'select';
    wallDraft = null;
    stairDraft = null;
    if (floorPlanPrevIso) {
        isolatedKind = floorPlanPrevIso.kind;
        isolatedId = floorPlanPrevIso.id;
        floorPlanPrevIso = null;
    } else { isolatedKind = null; isolatedId = null; }
    if (prev) rebuildBuildingSvg(prev.buildingId);
    updateLayerVisibility();
    renderFloorSelectors();
    renderBuildingEditor(); // restore the rotation handle
    sendMessage({ type: 'floorPlanEditExited' });
    renderBottomBar();
}
// Commit the in-progress wall chain onto the active floor.
function commitWallDraft() {
    if (!floorPlanEdit || !wallDraft || wallDraft.points.length < 2) { wallDraft = null; return; }
    const b = findBuilding(floorPlanEdit.buildingId);
    if (b) {
        const fi = b.activeFloor || 0;
        b.floors = b.floors || [];
        while (b.floors.length <= fi) b.floors.push({});
        const fl = b.floors[fi];
        fl.walls = fl.walls || [];
        for (let i = 0; i < wallDraft.points.length - 1; i++) {
            const a = wallDraft.points[i], c = wallDraft.points[i + 1];
            fl.walls.push({ x1: a.x, y1: a.y, x2: c.x, y2: c.y, thickness: 3 });
        }
        wallDraft = null;
        rebuildBuildingSvg(b.id);
        sendMessage({ type: 'mapChanged' });
        return;
    }
    wallDraft = null;
}

let splineDraft = null;   // { kind, preset, layerId, points:[{x,y,width}] } while drawing
let splineEdit = null;    // { splineId } while editing a committed spline
let splineDraftType = { kind: 'road', preset: 'residential' };

window.setSplineDraftType = (kind, preset) => {

    log('splineDraftType = ' + splineDraftType.kind + '/' + splineDraftType.preset);

function splineDefaultWidth() {
    const prof = splineProfile(splineDraftType.kind, splineDraftType.preset);
    return prof.defaultWidth || 24;
}

// Place-spline mode: each left-click drops a knot. Returns true if consumed.
function trySplinePoint(e) {
    if (toolMode !== 'spline' || mode !== 'edit') return false;
    if (e.button !== 0) return false;
    e.stopPropagation(); e.preventDefault();
    const wx = (e.clientX - pan.x) / zoom;
    const wy = (e.clientY - pan.y) / zoom;
    if (!splineDraft) {
        splineDraft = {
            kind: splineDraftType.kind, preset: splineDraftType.preset,
            layerId: activeLayerId, points: [],
        };
    }
    splineDraft.points.push({ x: wx, y: wy, width: splineDefaultWidth() });
    renderSplines();        // live preview (renderSplines draws the draft too)
    renderSplineEditor();
    return true;
}

function commitSplineDraft() {
    if (!splineDraft) return;
    if (splineDraft.points.length < 2) { splineDraft = null; renderSplines(); renderSplineEditor(); return; }
    // Bind to the currently-active layer (resolved at commit time, not draft start,
    // so changing the active layer mid-draw still lands the spline correctly).
    const layer = findLayer(activeLayerId) || findLayer(splineDraft.layerId) || firstLeafNode();
    if (layer) {
        layer.splines = layer.splines || [];
        layer.splines.push({
            id: 'spline-' + Date.now(),
            kind: splineDraft.kind,
            preset: splineDraft.preset,
            closed: false,
            points: splineDraft.points.map(p => ({ x: p.x, y: p.y, width: p.width })),
        });
    }
    splineDraft = null;
    render();
    sendMessage({ type: 'mapChanged' });
    renderSplineEditor();
    // Committing a spline also exits the spline tool (one spline per activation).
    toolMode = 'select';
    stage.style.cursor = 'default';
    sendMessage({ type: 'cancelSplineMode' });
}

function cancelSplineDraft() {
    splineDraft = null;
    renderSplines();
    renderSplineEditor();
}

function splineSelectionPayload(sp, selKnot) {
    const k = sp.points[selKnot] || {};
    const prof = splineProfile(sp.kind, sp.preset);
    const centerMk = (prof.markings || []).find(m => m.offset === 0)
                   || (prof.markings || [])[0];
    return {
        type: 'splineSelected', splineId: sp.id, kind: sp.kind, preset: sp.preset,
        closed: !!sp.closed,
        markingStyle: sp.markingStyle || '',
        // Effective part colours (override if set, else the preset's) — the
        // properties-panel colour pickers always need a concrete colour.
        casingColor: sp.casingColor || prof.casing.color,
        fillColor: sp.fillColor || prof.bands[0].color,
        markingColor: sp.markingColor || (centerMk ? centerMk.color : '#ffffff'),
        knotCount: (sp.points || []).length,
        selectedKnot: selKnot,
        knotType: k.typeOverride || '',
        knotBlend: k.blendFactor == null ? 1 : k.blendFactor,
        knotMarking: k.markingStyle || '',
        knotSharpness: k.sharpness || 0,
    };
}

}

// Reorder a spline within its layer's z-stack. dir > 0 = forward, dir < 0 = back.
window.moveSplineZ = (splineId, dir) => {
    const owner = findSplineOwner(splineId);
    if (!owner || !owner.splines) return;
    const i = owner.splines.findIndex(s => s.id === splineId);
    if (i < 0) return;
    const j = i + (dir > 0 ? 1 : -1);
    if (j < 0 || j >= owner.splines.length) return;
    const tmp = owner.splines[i];
    owner.splines[i] = owner.splines[j];
    owner.splines[j] = tmp;

window.setKnotSharpness = (splineId, knotIdx, val) => {

    renderSplineEditor();
    sendMessage({ type: 'mapChanged' });
};

// Insert a knot into segment `seg` (between knots seg and seg+1) at a world point.
function insertSplineKnot(splineId, seg, wx, wy) {
    const sp = findSpline(splineId);
    if (!sp || !sp.points) return;
    const n = sp.points.length;
    const a = sp.points[seg] || sp.points[0];
    const b = sp.points[(seg + 1) % n] || a;
    const w = ((a.width || 24) + (b.width || 24)) / 2;
    sp.points.splice(seg + 1, 0, { x: wx, y: wy, width: w });
    selectSpline(splineId);
    if (splineEdit) splineEdit.selKnot = seg + 1;
    renderSplines();
    renderSplineEditor();
    emitSplineSelection();
    sendMessage({ type: 'mapChanged' });
}

// Add a knot adjacent to knot `idx`. Mid-spline → midpoint of the neighbouring
// segment; at an end → extrapolated outward, so the spline grows.
function addAdjacentKnot(points, idx, after) {
    const n = points.length;
    const here = points[idx];
    if (after) {
        if (idx < n - 1) {
            const nx = points[idx + 1];
            points.splice(idx + 1, 0, { x: (here.x + nx.x) / 2, y: (here.y + nx.y) / 2,
                width: ((here.width || 24) + (nx.width || 24)) / 2 });
        } else {
            const prev = points[idx - 1] || here;
            points.push({ x: here.x + (here.x - prev.x), y: here.y + (here.y - prev.y),
                width: here.width || 24 });
        }
    } else {
        if (idx > 0) {
            const pv = points[idx - 1];
            points.splice(idx, 0, { x: (here.x + pv.x) / 2, y: (here.y + pv.y) / 2,
                width: ((here.width || 24) + (pv.width || 24)) / 2 });
        } else {
            const nx = points[idx + 1] || here;
            points.unshift({ x: here.x - (nx.x - here.x), y: here.y - (nx.y - here.y),
                width: here.width || 24 });
        }
    }
}
