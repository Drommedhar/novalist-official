# Publishes the Novalist website in /pages to GitHub Pages.
# Needed because branch-based Pages only supports / or /docs as the folder.
# One-time setup: Repo Settings → Pages → Source: "GitHub Actions".
name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
